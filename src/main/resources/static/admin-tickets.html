<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Tickets — Lab Management Admin</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *, *::before, *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        /* Updated Theme Colors to match the image */
        --primary: #f97316;        
        --primary2: #ea6c0a;       
        --accent: #f97316;         
        --accent-light: #fff7ed;   
        
        --text: #1a1a2e;           
        --text2: #64748b;          
        --text3: #94a3b8;          
        --border: #e2e8f0;         
        --white: #ffffff;
        --bg: #f8fafc;             
        --font: "Plus Jakarta Sans", sans-serif;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        flex-shrink: 0;
        background: linear-gradient(180deg, var(--primary) 0%, var(--primary2) 100%);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        left: 0; top: 0; bottom: 0;
        z-index: 100;
      }
      .sidebar-brand {
        padding: 0 20px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        margin-bottom: 16px;
      }
      .brand-row { display: flex; align-items: center; gap: 10px; }
      .brand-icon {
        width: 38px; height: 38px;
        background: rgba(255, 255, 255, 0.15);
        border-radius: 10px;
        display: flex; align-items: center; justify-content: center;
      }
      .brand-icon svg { width: 20px; height: 20px; }
      .brand-name {
        font-size: 14px; font-weight: 700;
        color: white; line-height: 1.2;
      }
      .nav-section { padding: 0 12px; flex: 1; }
      .nav-item {
        display: flex; align-items: center; gap: 10px;
        padding: 10px 12px; border-radius: 10px; margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.7);
        font-size: 13px; font-weight: 500;
        cursor: pointer; transition: all 0.2s; text-decoration: none;
      }
      .nav-item:hover { background: rgba(255, 255, 255, 0.1); color: white; }
      .nav-item.active {
        background: rgba(59, 130, 246, 0.25); /* Accent blue highlight */
        color: white; font-weight: 600;
      }
      .nav-item svg { width: 16px; height: 16px; flex-shrink: 0; }
      
      .sidebar-user {
        margin: 16px 12px 0; padding: 12px;
        border-radius: 12px; background: rgba(0, 0, 0, 0.2);
        display: flex; align-items: center; gap: 10px;
      }
      .user-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--accent);
        display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 700; color: white; flex-shrink: 0;
      }
      .user-name { font-size: 13px; font-weight: 600; color: white; }
      .user-role { font-size: 11px; color: rgba(255, 255, 255, 0.6); }

      /* ── MAIN & TOPBAR ── */
      .main {
        margin-left: 240px; flex: 1;
        display: flex; flex-direction: column; min-height: 100vh;
      }
      .topbar {
        background: var(--white); border-bottom: 1px solid var(--border);
        padding: 16px 32px; display: flex; align-items: center; justify-content: space-between;
        position: sticky; top: 0; z-index: 50;
      }
      .topbar-title { font-size: 20px; font-weight: 700; color: var(--text); }
      .topbar-right { display: flex; align-items: center; gap: 12px; }
      .search-bar {
        padding: 9px 16px; border: 1.5px solid var(--border); border-radius: 10px;
        font-family: var(--font); font-size: 13px; outline: none; width: 250px;
        background: var(--bg); transition: 0.2s;
      }
      .search-bar:focus { border-color: var(--accent); background: var(--white); }
      .topbar-date {
        padding: 8px 14px; border: 1px solid var(--border); border-radius: 10px;
        font-size: 13px; color: var(--text2); background: var(--bg);
      }
      .topbar-avatar {
        width: 36px; height: 36px; border-radius: 50%;
        background: var(--accent); display: flex; align-items: center; justify-content: center;
        font-size: 13px; font-weight: 700; color: white; cursor: pointer;
      }

      /* ── CONTENT ── */
      .content { padding: 28px 32px; flex: 1; max-width: 1000px; }

      /* ── STATS GRID ── */
      .stats-grid {
        display: grid; grid-template-columns: repeat(4, 1fr); gap: 16px; margin-bottom: 28px;
      }
      .stat-card {
        background: var(--white); border: 1px solid var(--border);
        border-radius: 16px; padding: 20px;
        display: flex; flex-direction: column; gap: 8px;
        position: relative; overflow: hidden;
      }
      .stat-card::after {
        content: ''; position: absolute; top: 0; left: 0; width: 100%; height: 4px;
      }
      .stat-card.total::after { background: var(--text2); }
      .stat-card.open::after { background: #ef4444; }
      .stat-card.progress::after { background: #f59e0b; }
      .stat-card.resolved::after { background: #10b981; }
      
      .stat-title { font-size: 12px; font-weight: 700; color: var(--text2); text-transform: uppercase; letter-spacing: 0.05em; }
      .stat-value { font-size: 28px; font-weight: 700; color: var(--text); }
      .stat-spinner { width: 20px; height: 20px; border: 2px solid var(--border); border-top-color: var(--text); border-radius: 50%; animation: spin 0.8s linear infinite; }

      /* ── TICKETS LIST ── */
      .tickets-header {
        display: flex; align-items: center; justify-content: space-between; margin-bottom: 16px;
      }
      .tickets-title { font-size: 16px; font-weight: 700; color: var(--text); }
      
      .ticket-card {
        background: var(--white); border: 1px solid var(--border); border-radius: 14px;
        padding: 16px 20px; display: flex; align-items: center; gap: 16px; margin-bottom: 10px;
        transition: all 0.2s;
      }
      .ticket-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.04); border-color: #cbd5e1;
      }
      .ticket-id {
        font-size: 12px; font-weight: 700; color: var(--primary); background: var(--accent-light);
        border: 1px solid #bfdbfe; border-radius: 8px; padding: 6px 10px; flex-shrink: 0;
      }
      .ticket-info { flex: 1; min-width: 0; }
      .ticket-title { font-size: 15px; font-weight: 600; color: var(--text); margin-bottom: 4px; }
      .ticket-meta { font-size: 13px; color: var(--text2); display: flex; gap: 12px; align-items: center; }
      .meta-divider { width: 4px; height: 4px; border-radius: 50%; background: var(--border); }
      
      .ticket-badges { display: flex; flex-direction: column; align-items: flex-end; gap: 6px; width: 120px; flex-shrink: 0; }
      .ticket-action { flex-shrink: 0; margin-left: 10px; }
      
      .btn-view {
        padding: 8px 16px; border-radius: 8px; border: none;
        background: var(--accent); color: white; font-family: var(--font);
        font-size: 13px; font-weight: 600; cursor: pointer; transition: 0.2s;
      }
      .btn-view:hover { background: #2563eb; }

      /* BADGES */
      .badge { font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }
      .status-open { background: #fef2f2; color: #b91c1c; border: 1px solid #fecaca; }
      .status-in_progress { background: #fffbeb; color: #b45309; border: 1px solid #fde68a; }
      .status-resolved { background: #f0fdf4; color: #15803d; border: 1px solid #bbf7d0; }
      .status-closed { background: #f1f5f9; color: #475569; border: 1px solid #e2e8f0; }
      
      .priority-low { background: #f0fdf4; color: #15803d; }
      .priority-medium { background: #fffbeb; color: #92400e; }
      .priority-high { background: #fff1f2; color: #991b1b; }
      .priority-urgent { background: #7f1d1d; color: #fecaca; }

      .empty-state { text-align: center; padding: 60px; color: var(--text3); font-size: 14px; background: var(--white); border: 1px dashed var(--border); border-radius: 14px; }
      .spinner-center { display: flex; justify-content: center; padding: 40px; }
      @keyframes spin { to { transform: rotate(360deg); } }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <div class="brand-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <path d="M12 22s8-4 8-10V5l-8-3-8 3v7c0 6 8 10 8 10z"/>
            </svg>
          </div>
          <div><div class="brand-name">LabAlloc Admin</div></div>
        </div>
      </div>
      <nav class="nav-section">
        <a href="/admin-dashboard.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7" /><rect x="14" y="3" width="7" height="7" /><rect x="3" y="14" width="7" height="7" /><rect x="14" y="14" width="7" height="7" /></svg>
          Dashboard
        </a>
        <a href="/admin-users.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"></path><circle cx="9" cy="7" r="4"></circle><path d="M23 21v-2a4 4 0 0 0-3-3.87"></path><path d="M16 3.13a4 4 0 0 1 0 7.75"></path></svg>
          Users & Roles
        </a>
        <a href="/admin-catalog.html" class="nav-item">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 6h16M4 10h16M4 14h16M4 18h16" /></svg>
          Equipment Catalog
        </a>
        <a href="/admin-tickets.html" class="nav-item active">
          <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"></path><polyline points="14 2 14 8 20 8"></polyline><line x1="16" y1="13" x2="8" y2="13"></line><line x1="16" y1="17" x2="8" y2="17"></line><polyline points="10 9 9 9 8 9"></polyline></svg>
          Tickets
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">--</div>
        <div>
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-role" id="sidebar-role">Administrator</div>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="topbar-title">Ticket Management</div>
        <div class="topbar-right">
          <input type="text" class="search-bar" id="searchInput" placeholder="Search ticket ID or keyword...">
          <div class="topbar-date" id="topbar-date"></div>
          <div class="topbar-avatar" id="topbar-avatar">--</div>
        </div>
      </div>

      <div class="content">
        <div class="stats-grid">
          <div class="stat-card total">
            <div class="stat-title">Total Tickets</div>
            <div class="stat-value" id="stat-total"><div class="stat-spinner"></div></div>
          </div>
          <div class="stat-card open">
            <div class="stat-title">Open Issues</div>
            <div class="stat-value" id="stat-open"><div class="stat-spinner"></div></div>
          </div>
          <div class="stat-card progress">
            <div class="stat-title">In Progress</div>
            <div class="stat-value" id="stat-progress"><div class="stat-spinner"></div></div>
          </div>
          <div class="stat-card resolved">
            <div class="stat-title">Resolved</div>
            <div class="stat-value" id="stat-resolved"><div class="stat-spinner"></div></div>
          </div>
        </div>

        <div class="tickets-header">
          <div class="tickets-title">All Tickets</div>
        </div>
        <div id="tickets-container">
          <div class="spinner-center"><div class="stat-spinner" style="width:30px; height:30px; border-width:3px; border-top-color:var(--accent);"></div></div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";
      const token = sessionStorage.getItem("token");
      const username = sessionStorage.getItem("username");
      
      // Basic Auth Check
      if (!token) window.location.href = "/login.html";
      
      if (username) {
        const initials = username.substring(0, 2).toUpperCase();
        document.getElementById("sidebar-avatar").textContent = initials;
        document.getElementById("topbar-avatar").textContent = initials;
        document.getElementById("sidebar-name").textContent = username;
      }

      document.getElementById("topbar-date").textContent = new Date().toLocaleDateString("en-GB", {
        weekday: "short", day: "numeric", month: "long", year: "numeric"
      });

      let allTickets = [];

      async function loadTickets() {
        try {
          const res = await fetch(`${API}/admin/tickets`, {
            headers: { "Authorization": "Bearer " + token }
          });
          
          if (!res.ok) throw new Error("Failed to fetch tickets");
          allTickets = await res.json();
          
          updateStats(allTickets);
          renderTickets(allTickets);
        } catch (error) {
          console.error(error);
          document.getElementById("tickets-container").innerHTML = 
            `<div class="empty-state">Failed to load tickets. Please ensure backend is running.</div>`;
          document.getElementById("stat-total").textContent = "0";
          document.getElementById("stat-open").textContent = "0";
          document.getElementById("stat-progress").textContent = "0";
          document.getElementById("stat-resolved").textContent = "0";
        }
      }

      function updateStats(tickets) {
        const total = tickets.length;
        // The original issue status drives the open/progress/resolved state
        const open = tickets.filter(t => t.originalIssue && t.originalIssue.status === 'OPEN').length;
        const progress = tickets.filter(t => t.originalIssue && t.originalIssue.status === 'IN_PROGRESS').length;
        const resolved = tickets.filter(t => t.originalIssue && (t.originalIssue.status === 'RESOLVED' || t.originalIssue.status === 'CLOSED')).length;

        document.getElementById("stat-total").textContent = total;
        document.getElementById("stat-open").textContent = open;
        document.getElementById("stat-progress").textContent = progress;
        document.getElementById("stat-resolved").textContent = resolved;
      }

      function renderTickets(tickets) {
        const container = document.getElementById("tickets-container");
        
        if (tickets.length === 0) {
          container.innerHTML = `<div class="empty-state">No tickets found in the system.</div>`;
          return;
        }

        // Sort by assignment date, newest first
        tickets.sort((a, b) => new Date(b.assignmentDate || 0) - new Date(a.assignmentDate || 0));

        container.innerHTML = tickets.map(ticket => {
          const issue = ticket.originalIssue || {};
          const status = issue.status || 'OPEN';
          const priority = ticket.adminPriority || 'MEDIUM';
          const date = new Date(ticket.assignmentDate || new Date()).toLocaleDateString("en-GB", { day: 'numeric', month: 'short', year: 'numeric' });
          
          const reporter = issue.user ? issue.user.username : 'Student';
          const labName = issue.lab ? issue.lab.labName : (issue.equipment ? 'Equipment Issue' : 'General');
          
          const statusClass = "status-" + status.toLowerCase();
          const priorityClass = "priority-" + priority.toLowerCase();
          const statusLabel = status.replace("_", " ");

          return `
            <div class="ticket-card">
              <div class="ticket-id">TCK-${String(ticket.id).padStart(3, '0')}</div>
              <div class="ticket-info">
                <div class="ticket-title">${issue.title || 'Untitled Issue'}</div>
                <div class="ticket-meta">
                  <span>Reported by <strong>${reporter}</strong></span>
                  <div class="meta-divider"></div>
                  <span>${labName}</span>
                  <div class="meta-divider"></div>
                  <span>Assigned ${date}</span>
                </div>
              </div>
              <div class="ticket-badges">
                <span class="badge ${statusClass}">${statusLabel}</span>
                <span class="badge ${priorityClass}">${priority}</span>
              </div>
              <div class="ticket-action">
                <button class="btn-view" onclick="viewTicket(${ticket.id})">Review</button>
              </div>
            </div>
          `;
        }).join("");
      }

      // Simple Search Filtering
      document.getElementById('searchInput').addEventListener('input', (e) => {
        const term = e.target.value.toLowerCase();
        const filtered = allTickets.filter(t => {
          const title = (t.originalIssue?.title || "").toLowerCase();
          const id = String(t.id).toLowerCase();
          return title.includes(term) || id.includes(term);
        });
        renderTickets(filtered);
      });

      function viewTicket(id) {
        // In a real app, this would open a modal or navigate to a detail page
        alert('Opening resolution modal for Ticket: TCK-' + String(id).padStart(3, '0'));
      }

      // Init
      loadTickets();
    </script>
  </body>
</html>
