<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Manage Staff — Lab Management System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/theme.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --orange: #f97316;
        --orange2: #ea6c0a;
        --orange3: #fb923c;
        --text: #1a1a2e;
        --text2: #64748b;
        --text3: #94a3b8;
        --border: #e2e8f0;
        --white: #ffffff;
        --bg: #f8fafc;
        --font: "Plus Jakarta Sans", sans-serif;
      }
      [data-theme="dark"] {
        --text: #f1f5f9;
        --text2: #cbd5e1;
        --text3: #94a3b8;
        --border: #334155;
        --white: #1e293b;
        --bg: #0f172a;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
      }

      .sidebar {
        width: 240px;
        min-height: 100vh;
        flex-shrink: 0;
        background: linear-gradient(180deg, #1a1a2e 0%, #0f172a 100%);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
      .sidebar-brand {
        padding: 0 20px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.08);
        margin-bottom: 16px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-icon {
        width: 38px;
        height: 38px;
        background: rgba(249, 115, 22, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-icon svg {
        width: 20px;
        height: 20px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 700;
        color: white;
        line-height: 1.2;
      }
      .brand-sub {
        font-size: 10px;
        color: rgba(249, 115, 22, 0.8);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.08em;
        margin-top: 2px;
      }
      .nav-section {
        padding: 0 12px;
        flex: 1;
      }
      .nav-label {
        margin: 16px 0 6px 12px;
        font-size: 10px;
        font-weight: 700;
        color: rgba(255, 255, 255, 0.3);
        text-transform: uppercase;
        letter-spacing: 0.08em;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.55);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.08);
        color: rgba(255, 255, 255, 0.9);
      }
      .nav-item.active {
        background: rgba(249, 115, 22, 0.15);
        color: #fb923c;
        font-weight: 600;
        border-left: 3px solid var(--orange);
      }
      .nav-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sidebar-user {
        margin: 16px 12px 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(249, 115, 22, 0.1);
        border: 1px solid rgba(249, 115, 22, 0.2);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange), var(--orange2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: white;
      }
      .user-role {
        font-size: 11px;
        color: rgba(249, 115, 22, 0.8);
      }

      .main {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }
      .topbar {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar-left {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .topbar-badge {
        font-size: 11px;
        font-weight: 700;
        padding: 4px 10px;
        border-radius: 999px;
        background: rgba(249, 115, 22, 0.1);
        color: var(--orange);
        border: 1px solid rgba(249, 115, 22, 0.2);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-date {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 13px;
        color: var(--text2);
        background: var(--bg);
      }
      .topbar-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: var(--white);
        color: var(--text2);
        position: relative;
      }
      .theme-toggle {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border);
        background: var(--white);
        cursor: pointer;
        display: flex;
        align-items: center;
        justify-content: center;
        transition: all 0.2s;
      }
      .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, #1a1a2e, #1e293b);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        cursor: pointer;
        text-decoration: none;
      }
      .notif-dot {
        width: 8px;
        height: 8px;
        background: var(--orange);
        border-radius: 50%;
        position: absolute;
        top: 6px;
        right: 6px;
        border: 2px solid var(--white);
      }

      .content {
        padding: 28px 32px;
        flex: 1;
      }

      .stats-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 28px;
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px;
        border-top: 3px solid transparent;
      }
      .stat-card.orange {
        border-top-color: var(--orange);
      }
      .stat-card.blue {
        border-top-color: #3b82f6;
      }
      .stat-card.green {
        border-top-color: #22c55e;
      }
      .stat-label {
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        margin-bottom: 10px;
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .stat-value {
        font-size: 32px;
        font-weight: 700;
        color: var(--text);
        line-height: 1;
      }

      .section-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
      }
      .section-header {
        display: flex;
        align-items: center;
        justify-content: space-between;
        margin-bottom: 20px;
      }
      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
      }

      .toolbar {
        display: flex;
        gap: 12px;
        margin-bottom: 16px;
      }
      .search-box {
        position: relative;
        flex: 1;
      }
      .search-icon {
        position: absolute;
        left: 14px;
        top: 50%;
        transform: translateY(-50%);
        color: var(--text3);
      }
      .search-input {
        width: 100%;
        padding: 10px 14px 10px 40px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-family: var(--font);
        font-size: 13px;
        outline: none;
        background: var(--white);
        color: var(--text);
      }
      .search-input:focus {
        border-color: var(--orange);
      }

      .table-container {
        overflow-x: auto;
      }
      .data-table {
        width: 100%;
        border-collapse: collapse;
      }
      .data-table th {
        text-align: left;
        padding: 14px;
        font-size: 12px;
        font-weight: 600;
        color: var(--text2);
        border-bottom: 2px solid var(--border);
        text-transform: uppercase;
        letter-spacing: 0.05em;
      }
      .data-table td {
        padding: 14px;
        font-size: 13px;
        color: var(--text);
        border-bottom: 1px solid var(--border);
        vertical-align: middle;
      }
      .data-table tr:hover td {
        background: var(--bg);
      }
      .data-table tr:last-child td {
        border-bottom: none;
      }

      .status-badge {
        font-size: 10px;
        font-weight: 700;
        padding: 4px 8px;
        border-radius: 20px;
        text-transform: uppercase;
      }
      .badge-active {
        background: #dcfce7;
        color: #15803d;
      }
      .badge-inactive {
        background: #f1f5f9;
        color: #64748b;
      }
      .badge-tech {
        background: rgba(249, 115, 22, 0.1);
        color: var(--orange);
      }

      .user-cell {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-cell-avatar {
        width: 32px;
        height: 32px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange), var(--orange2));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 11px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }

      .pagination {
        display: flex;
        justify-content: flex-end;
        align-items: center;
        gap: 8px;
        margin-top: 20px;
        font-size: 13px;
        color: var(--text2);
      }
      .page-btn {
        padding: 6px 12px;
        border: 1px solid var(--border);
        background: var(--white);
        border-radius: 6px;
        cursor: pointer;
        font-family: var(--font);
        color: var(--text);
      }
      .page-btn:hover:not(:disabled) {
        background: var(--bg);
      }
      .page-btn:disabled {
        opacity: 0.5;
        cursor: not-allowed;
      }
    </style>
  </head>
  <body>
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <div class="brand-icon">
            <svg
              viewBox="0 0 32 32"
              fill="none"
              stroke="#f97316"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" y1="16" x2="12" y2="16" />
              <line x1="12" y1="9" x2="12" y2="23" />
              <line x1="12" y1="10.5" x2="26" y2="5" />
              <line x1="12" y1="21.5" x2="26" y2="27" />
              <polygon
                points="22,24.5 26,27 23.5,22.5"
                fill="#f97316"
                stroke="none"
              />
              <line x1="26" y1="5" x2="26" y2="2" />
              <line x1="26" y1="27" x2="26" y2="30" />
            </svg>
          </div>
          <div>
            <div class="brand-name">Laboratory Management System</div>
            <div class="brand-sub">Lead Admin</div>
          </div>
        </div>
      </div>
      <nav class="nav-section">
        <div class="nav-label">Overview</div>
        <a href="/lead-admin-dashboard.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <div class="nav-label">Management</div>

        <a href="/lead-admin-tickets.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          Issue Tickets
        </a>
        <a href="/lead-admin-users.html" class="nav-item active">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2" />
            <circle cx="9" cy="7" r="4" />
            <path d="M23 21v-2a4 4 0 00-3-3.87" />
            <path d="M16 3.13a4 4 0 010 7.75" />
          </svg>
          Manage Staff
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">LA</div>
        <div>
          <div class="user-name" id="sidebar-name">Lead Admin</div>
          <div class="user-role">System Administrator</div>
        </div>
      </div>
    </aside>

    <div class="main">
      <div class="topbar">
        <div class="topbar-left">
          <div class="topbar-title">Manage Staff</div>
          <span class="topbar-badge">ADMIN</span>
        </div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <button
            id="theme-btn"
            class="theme-toggle"
            type="button"
            title="Toggle theme"
          ></button>
          <div class="topbar-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
              />
            </svg>
            <div class="notif-dot"></div>
          </div>
          <a href="/profile-admin.html" style="text-decoration: none">
            <div class="topbar-avatar" id="topbar-avatar">LA</div>
          </a>
        </div>
      </div>

      <div class="content">
        <div class="stats-grid">
          <div class="stat-card orange">
            <div class="stat-label">Total Staff</div>
            <div class="stat-value" id="stat-total">—</div>
          </div>
          <div class="stat-card green">
            <div class="stat-label">Active</div>
            <div class="stat-value" id="stat-active">—</div>
          </div>
          <div class="stat-card blue">
            <div class="stat-label">Lab Technicians</div>
            <div class="stat-value" id="stat-tech">—</div>
          </div>
        </div>

        <div class="section-card">
          <div class="section-header">
            <div class="section-title">Lab Technician Staff</div>
          </div>
          <div class="toolbar">
            <div class="search-box">
              <svg
                class="search-icon"
                width="16"
                height="16"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="11" cy="11" r="8" />
                <line x1="21" y1="21" x2="16.65" y2="16.65" />
              </svg>
              <input
                type="text"
                class="search-input"
                id="search-users"
                placeholder="Search by username or email..."
                oninput="renderTable()"
              />
            </div>
          </div>
          <div class="table-container">
            <table class="data-table">
              <thead>
                <tr>
                  <th>#</th>
                  <th>Staff Member</th>
                  <th>Email</th>
                  <th>Phone</th>
                  <th>Role</th>
                  <th>Status</th>
                </tr>
              </thead>
              <tbody id="table-body">
                <tr>
                  <td
                    colspan="6"
                    style="
                      text-align: center;
                      color: var(--text3);
                      padding: 30px;
                    "
                  >
                    Loading...
                  </td>
                </tr>
              </tbody>
            </table>
          </div>
          <div class="pagination" id="pagination"></div>
        </div>
      </div>
    </div>

    <script>
      const API = "/api";
      const token = sessionStorage.getItem("token");
      const username = sessionStorage.getItem("username");
      const role = sessionStorage.getItem("role");
      if (!token) window.location.href = "/login.html";
      if (role !== "ADMIN") window.location.href = "/admin-dashboard.html";

      if (username) {
        const i = username.substring(0, 2).toUpperCase();
        document.getElementById("sidebar-avatar").textContent = i;
        document.getElementById("topbar-avatar").textContent = i;
        document.getElementById("sidebar-name").textContent = username;
      }
      document.getElementById("topbar-date").textContent =
        new Date().toLocaleDateString("en-GB", {
          weekday: "short",
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      let users = [];
      const PAGE_LIMIT = 8;
      let page = 1;

      async function loadData() {
        try {
          const res = await fetch(`${API}/auth/users`, {
            headers: { Authorization: "Bearer " + token },
          });
          if (res.ok) {
            const all = await res.json();
            users = all.filter((u) => u.role === "LAB_TECHNICIAN");
            document.getElementById("stat-total").textContent = users.length;
            document.getElementById("stat-active").textContent = users.filter(
              (u) => u.active !== false,
            ).length;
            document.getElementById("stat-tech").textContent = users.length;
            renderTable();
          }
        } catch (e) {}
      }

      function renderTable() {
        const search = document
          .getElementById("search-users")
          .value.toLowerCase();
        let filtered = users.filter(
          (u) =>
            (u.username || "").toLowerCase().includes(search) ||
            (u.email || "").toLowerCase().includes(search),
        );
        const paginated = filtered.slice(
          (page - 1) * PAGE_LIMIT,
          page * PAGE_LIMIT,
        );
        const tbody = document.getElementById("table-body");
        if (!paginated.length) {
          tbody.innerHTML =
            '<tr><td colspan="6" style="text-align:center;color:var(--text3);padding:30px;">No staff found.</td></tr>';
          renderPagination(filtered.length);
          return;
        }
        tbody.innerHTML = paginated
          .map(
            (u, i) => `<tr>
        <td style="color:var(--text2);font-size:12px;">${(page - 1) * PAGE_LIMIT + i + 1}</td>
        <td>
          <div class="user-cell">
            <div class="user-cell-avatar">${(u.username || "?").substring(0, 2).toUpperCase()}</div>
            <span style="font-weight:600;">${u.username || "—"}</span>
          </div>
        </td>
        <td style="color:var(--text2);">${u.email || "—"}</td>
        <td style="color:var(--text2);">${u.phoneNumber || "—"}</td>
        <td><span class="status-badge badge-tech">Lab Technician</span></td>
        <td><span class="status-badge ${u.active !== false ? "badge-active" : "badge-inactive"}">${u.active !== false ? "Active" : "Inactive"}</span></td>
      </tr>`,
          )
          .join("");
        renderPagination(filtered.length);
      }

      function renderPagination(total) {
        const totalPages = Math.ceil(total / PAGE_LIMIT) || 1;
        document.getElementById("pagination").innerHTML = `
        <button class="page-btn" ${page === 1 ? "disabled" : ""} onclick="changePage(${page - 1})">Prev</button>
        <span>Page ${page} of ${totalPages} · ${total} records</span>
        <button class="page-btn" ${page === totalPages ? "disabled" : ""} onclick="changePage(${page + 1})">Next</button>`;
      }
      function changePage(p) {
        page = p;
        renderTable();
      }

      loadData();
    </script>
    <script src="/notifications.js"></script>
  </body>
</html>
