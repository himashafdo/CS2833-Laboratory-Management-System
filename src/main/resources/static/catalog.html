<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Resources & Lab Catalog — Lab Reservation System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <script src="/logo.js"></script>
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --orange: #f97316;
        --orange2: #ea6c0a;
        --orange3: #fb923c;
        --sidebar: #f97316;
        --sidebar-dark: #c2410c;
        --text: #1a1a2e;
        --text2: #64748b;
        --text3: #94a3b8;
        --border: #e2e8f0;
        --white: #ffffff;
        --bg: #f8fafc;
        --font: "Plus Jakarta Sans", sans-serif;
        --success: #22c55e;
        --warning: #f59e0b;
        --danger: #ef4444;
        --info: #3b82f6;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        flex-shrink: 0;
        background: linear-gradient(
          180deg,
          var(--sidebar) 0%,
          var(--sidebar-dark) 100%
        );
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
      .sidebar-brand {
        padding: 0 20px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        margin-bottom: 16px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-icon {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-icon svg {
        width: 20px;
        height: 20px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 700;
        color: white;
        line-height: 1.2;
      }
      .brand-sub {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
      }

      .nav-section {
        padding: 0 12px;
        flex: 1;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .nav-item.active {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        font-weight: 600;
      }
      .nav-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .nav-dot {
        width: 6px;
        height: 6px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.6);
        flex-shrink: 0;
      }

      .sidebar-user {
        margin: 16px 12px 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: white;
      }
      .user-role {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
      }

      /* ── MAIN CONTENT ── */
      .main {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── TOP BAR ── */
      .topbar {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-date {
        padding: 8px 16px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 13px;
        color: var(--text2);
        background: var(--bg);
      }
      .topbar-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: var(--white);
        color: var(--text2);
      }
      .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange), var(--orange3));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
      }

      /* ── PAGE CONTENT ── */
      .content {
        padding: 28px 32px;
        flex: 1;
      }

      /* ── SEARCH & FILTERS ── */
      .search-bar {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 12px;
        padding: 10px 16px;
        display: flex;
        align-items: center;
        gap: 10px;
        width: 300px;
      }
      .search-bar input {
        border: none;
        outline: none;
        font-family: var(--font);
        font-size: 13px;
        color: var(--text);
        width: 100%;
        background: transparent;
      }
      .search-bar input::placeholder {
        color: var(--text3);
      }
      .search-bar svg {
        color: var(--text3);
        flex-shrink: 0;
      }

      .filter-row {
        display: flex;
        align-items: center;
        gap: 10px;
        margin: 20px 0 24px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 7px 16px;
        border-radius: 20px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: 1.5px solid var(--border);
        background: var(--white);
        color: var(--text2);
      }
      .filter-btn:hover {
        border-color: var(--orange);
        color: var(--orange);
      }
      .filter-btn.active {
        background: var(--orange);
        border-color: var(--orange);
        color: white;
      }
      .sort-btn {
        margin-left: auto;
        padding: 7px 16px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--white);
        font-family: var(--font);
        font-size: 13px;
        color: var(--text2);
        cursor: pointer;
      }

      /* ── TABS ── */
      .tabs {
        display: flex;
        gap: 0;
        border-bottom: 2px solid var(--border);
        margin-bottom: 24px;
      }
      .tab {
        padding: 10px 20px;
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        color: var(--text2);
        border-bottom: 2px solid transparent;
        margin-bottom: -2px;
        transition: all 0.2s;
      }
      .tab:hover {
        color: var(--orange);
      }
      .tab.active {
        color: var(--orange);
        border-bottom-color: var(--orange);
        font-weight: 600;
      }

      /* ── EQUIPMENT GRID ── */
      .section-title {
        font-size: 16px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 16px;
      }
      .equipment-grid {
        display: grid;
        grid-template-columns: repeat(3, 1fr);
        gap: 16px;
        margin-bottom: 32px;
      }

      .equipment-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px;
        transition: all 0.2s;
        cursor: pointer;
      }
      .equipment-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        transform: translateY(-2px);
        border-color: #d1d5db;
      }

      .card-top {
        display: flex;
        align-items: flex-start;
        gap: 12px;
        margin-bottom: 14px;
      }
      .card-icon {
        width: 44px;
        height: 44px;
        border-radius: 10px;
        background: var(--bg);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        border: 1px solid var(--border);
      }
      .card-icon svg {
        width: 22px;
        height: 22px;
        color: var(--text2);
      }
      .card-info {
        flex: 1;
        min-width: 0;
      }
      .card-name {
        font-size: 14px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 2px;
        white-space: nowrap;
        overflow: hidden;
        text-overflow: ellipsis;
      }
      .card-category {
        font-size: 12px;
        color: var(--text2);
      }

      .status-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 3px 10px;
        border-radius: 20px;
        flex-shrink: 0;
      }
      .status-available {
        background: #dcfce7;
        color: #15803d;
      }
      .status-inuse {
        background: #fef9c3;
        color: #854d0e;
      }
      .status-maintenance {
        background: #fee2e2;
        color: #991b1b;
      }
      .status-unavailable {
        background: #f1f5f9;
        color: #64748b;
      }

      .card-meta {
        display: flex;
        align-items: center;
        gap: 6px;
        font-size: 12px;
        color: var(--text2);
        margin-bottom: 6px;
      }
      .card-meta svg {
        width: 13px;
        height: 13px;
      }

      .card-actions {
        display: flex;
        gap: 8px;
        margin-top: 14px;
      }
      .btn-book {
        flex: 1;
        padding: 9px;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
      }
      .btn-book-orange {
        background: var(--orange);
        color: white;
      }
      .btn-book-orange:hover {
        background: var(--orange2);
      }
      .btn-book-dark {
        background: var(--text);
        color: white;
      }
      .btn-book-dark:hover {
        background: #2d2d2d;
      }
      .btn-book-disabled {
        background: #f1f5f9;
        color: var(--text3);
        cursor: not-allowed;
      }

      /* ── LAB ROOMS LIST ── */
      .lab-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .lab-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all 0.2s;
        cursor: pointer;
      }
      .lab-card:hover {
        box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
        border-color: #d1d5db;
      }
      .lab-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .lab-icon svg {
        width: 24px;
        height: 24px;
        color: var(--text2);
      }
      .lab-info {
        flex: 1;
      }
      .lab-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 3px;
      }
      .lab-location {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 4px;
      }
      .lab-equipment-tags {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
      }
      .lab-tag {
        font-size: 11px;
        color: var(--text3);
        padding: 2px 8px;
        background: var(--bg);
        border-radius: 4px;
        border: 1px solid var(--border);
      }
      .lab-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .btn-reserve {
        padding: 9px 20px;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: none;
        background: var(--text);
        color: white;
      }
      .btn-reserve:hover {
        background: #2d2d2d;
      }
      .btn-reserve-disabled {
        background: #f1f5f9;
        color: var(--text3);
        cursor: not-allowed;
      }

      /* ── LOADING / EMPTY ── */
      .loading {
        text-align: center;
        padding: 60px;
        color: var(--text3);
        font-size: 14px;
      }
      .spinner-wrap {
        display: flex;
        justify-content: center;
        margin-bottom: 12px;
      }
      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      /* ── MODAL ── */
      .modal-overlay {
        position: fixed;
        inset: 0;
        background: rgba(0, 0, 0, 0.5);
        display: none;
        align-items: center;
        justify-content: center;
        z-index: 200;
      }
      .modal-overlay.show {
        display: flex;
      }
      .modal {
        background: var(--white);
        border-radius: 20px;
        padding: 32px;
        width: 100%;
        max-width: 440px;
        margin: 20px;
        box-shadow: 0 20px 60px rgba(0, 0, 0, 0.2);
      }
      .modal-title {
        font-size: 18px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 6px;
      }
      .modal-sub {
        font-size: 13px;
        color: var(--text2);
        margin-bottom: 24px;
      }
      .modal-field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }
      .modal-field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .modal-field input,
      .modal-field select {
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: var(--font);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
        background: var(--bg);
      }
      .modal-field input:focus,
      .modal-field select:focus {
        border-color: var(--orange);
        background: var(--white);
      }
      .modal-row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
      }
      .modal-actions {
        display: flex;
        gap: 10px;
        margin-top: 8px;
      }
      .btn-cancel {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: 1.5px solid var(--border);
        background: var(--white);
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        color: var(--text2);
        cursor: pointer;
      }
      .btn-confirm {
        flex: 1;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--orange), var(--orange2));
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
      }
      .btn-confirm:hover {
        opacity: 0.9;
      }
      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .alert.show {
        display: block;
      }
      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
      }
      .alert.error {
        background: #fff1f2;
        border: 1px solid #fecdd3;
        color: #be123c;
      }

      @media (max-width: 1024px) {
        .equipment-grid {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .equipment-grid {
          grid-template-columns: 1fr;
        }
        .content {
          padding: 20px 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <div class="brand-icon">
            <svg
              viewBox="0 0 32 32"
              fill="none"
              stroke="white"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" y1="16" x2="12" y2="16" />
              <line x1="12" y1="9" x2="12" y2="23" />
              <line x1="12" y1="10.5" x2="26" y2="5" />
              <line x1="12" y1="21.5" x2="26" y2="27" />
              <polygon
                points="22,24.5 26,27 23.5,22.5"
                fill="white"
                stroke="none"
              />
              <line x1="26" y1="5" x2="26" y2="2" />
              <line x1="26" y1="27" x2="26" y2="30" />
            </svg>
          </div>
          <div>
            <div class="brand-name">Laboratory Management System</div>
          </div>
        </div>
      </div>

      <nav class="nav-section">
        <a href="/student-dashboard.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <a href="/catalog.html" class="nav-item active">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Equipment & Lab Spaces
        </a>
        <a href="/my-reservations.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          My Reservations
        </a>

        <a href="/report-issue.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          Report Issue
        </a>
        <a href="/requests.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
            />
          </svg>
          Equipment Requests
        </a>
      </nav>

      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">MS</div>
        <div>
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-role" id="sidebar-role">Student</div>
        </div>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main">
      <!-- Topbar -->
      <div class="topbar">
        <div class="topbar-title">Resources & Lab Catalog</div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <div class="topbar-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
              />
            </svg>
          </div>
          <a href="/profile.html" style="text-decoration: none">
            <div class="topbar-avatar" id="topbar-avatar">--</div>
          </a>
        </div>
      </div>

      <!-- Content -->
      <div class="content">
        <!-- Search + Filters -->
        <div
          style="display: flex; align-items: center; gap: 12px; flex-wrap: wrap"
        >
          <div class="search-bar">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <circle cx="11" cy="11" r="8" />
              <line x1="21" y1="21" x2="16.65" y2="16.65" />
            </svg>
            <input
              type="text"
              id="search-input"
              placeholder="Search by name, category..."
            />
          </div>
          <div class="filter-row" style="margin: 0; flex: 1">
            <button class="filter-btn active" onclick="setFilter('all', this)">
              All
            </button>
            <button class="filter-btn" onclick="setFilter('equipment', this)">
              Equipment
            </button>
            <button class="filter-btn" onclick="setFilter('labs', this)">
              Lab Rooms
            </button>
            <button class="filter-btn" onclick="setFilter('available', this)">
              Available Now
            </button>
            <select class="sort-btn" id="sort-select" onchange="sortItems()">
              <option value="name">Sort: Name</option>
              <option value="availability">Sort: Availability</option>
              <option value="quantity">Sort: Quantity</option>
            </select>
          </div>
        </div>

        <!-- Tabs -->
        <div class="tabs" style="margin-top: 20px">
          <div class="tab active" id="tab-all" onclick="switchTab('all')">
            All Resources (<span id="count-all">0</span>)
          </div>
          <div class="tab" id="tab-equipment" onclick="switchTab('equipment')">
            Equipment (<span id="count-equipment">0</span>)
          </div>
          <div class="tab" id="tab-labs" onclick="switchTab('labs')">
            Lab Rooms (<span id="count-labs">0</span>)
          </div>
        </div>

        <!-- Alert -->
        <div id="main-alert" class="alert"></div>

        <!-- Equipment Section -->
        <div id="equipment-section">
          <div class="section-title">Equipment</div>
          <div class="equipment-grid" id="equipment-grid">
            <div class="loading">
              <div class="spinner-wrap"><div class="spinner"></div></div>
              Loading equipment...
            </div>
          </div>
        </div>

        <!-- Labs Section -->
        <div id="labs-section">
          <div class="section-title">Lab Rooms</div>
          <div class="lab-list" id="labs-list">
            <div class="loading">
              <div class="spinner-wrap"><div class="spinner"></div></div>
              Loading labs...
            </div>
          </div>
        </div>
      </div>
    </div>

    <!-- ── BOOKING MODAL ── -->
    <div class="modal-overlay" id="booking-modal">
      <div class="modal">
        <div class="modal-title" id="modal-title">Book Equipment</div>
        <div class="modal-sub" id="modal-sub">Select your time slot</div>
        <div id="modal-alert" class="alert"></div>
        <div class="modal-field">
          <label>Date</label>
          <input type="date" id="booking-date" />
        </div>
        <div class="modal-row">
          <div class="modal-field">
            <label>Start Time</label>
            <input type="time" id="booking-start" />
          </div>
          <div class="modal-field">
            <label>End Time</label>
            <input type="time" id="booking-end" />
          </div>
        </div>
        <div class="modal-field" id="lab-select-wrap" style="display: none">
          <label>Select Lab</label>
          <select id="booking-lab">
            <option value="">-- Select Lab --</option>
          </select>
        </div>
        <div class="modal-field" id="quantity-wrap" style="display: none">
          <label>Number of Workstations (max 3)</label>
          <input
            type="number"
            id="booking-quantity"
            min="1"
            max="3"
            value="1"
          />
        </div>
        <div class="modal-actions">
          <button class="btn-cancel" onclick="closeModal()">Cancel</button>
          <button
            class="btn-confirm"
            id="confirm-btn"
            onclick="confirmBooking()"
          >
            Confirm Booking
          </button>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";
      let allEquipment = [];
      let allLabs = [];
      let currentFilter = "all";
      let currentTab = "all";
      let selectedItem = null;
      let selectedType = null;

      // ── AUTH CHECK ──
      const token = sessionStorage.getItem("token");
      const username = sessionStorage.getItem("username");
      const role = sessionStorage.getItem("role");

      if (!token) window.location.href = "/";

      // ── SET USER INFO ──
      if (username) {
        const initials = username.substring(0, 2).toUpperCase();
        document.getElementById("sidebar-avatar").textContent = initials;
        document.getElementById("topbar-avatar").textContent = initials;
        document.getElementById("sidebar-name").textContent = username;
        document.getElementById("sidebar-role").textContent =
          role === "LAB_TECHNICIAN" ? "Lab Technician" : "Student";
      }

      // ── DATE ──
      const now = new Date();
      document.getElementById("topbar-date").textContent =
        now.toLocaleDateString("en-GB", {
          weekday: "short",
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      // ── SET MIN DATE FOR BOOKING ──
      document.getElementById("booking-date").min = new Date()
        .toISOString()
        .split("T")[0];

      // ── FETCH DATA ──
      async function fetchAll() {
        try {
          const [eqRes, labRes] = await Promise.all([
            fetch(`${API}/catalog/equipment`, {
              headers: { Authorization: "Bearer " + token },
            }),
            fetch(`${API}/catalog/labs`, {
              headers: { Authorization: "Bearer " + token },
            }),
          ]);
          allEquipment = await eqRes.json();
          allLabs = await labRes.json();
          updateCounts();
          renderEquipment(allEquipment);
          renderLabs(allLabs);
          populateLabSelect();
        } catch (e) {
          document.getElementById("equipment-grid").innerHTML =
            '<div class="loading">Failed to load equipment.</div>';
          document.getElementById("labs-list").innerHTML =
            '<div class="loading">Failed to load labs.</div>';
        }
      }

      function updateCounts() {
        document.getElementById("count-all").textContent =
          allEquipment.length + allLabs.length;
        document.getElementById("count-equipment").textContent =
          allEquipment.length;
        document.getElementById("count-labs").textContent = allLabs.length;
      }

      // ── EQUIPMENT ICON ──
      function getEquipmentIcon(name) {
        const n = name.toLowerCase();
        if (n.includes("oscilloscope"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 9l3 3 3-6 3 5 2-2"/><line x1="8" y1="21" x2="16" y2="21"/><line x1="12" y1="17" x2="12" y2="21"/></svg>`;
        if (n.includes("power supply") || n.includes("ac") || n.includes("dc"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="7" width="18" height="13" rx="2"/><path d="M8 7V5a2 2 0 014 0v2M12 12v3M10 13.5h4"/></svg>`;
        if (n.includes("multimeter"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="3" width="14" height="18" rx="2"/><circle cx="12" cy="10" r="3"/><line x1="9" y1="17" x2="15" y2="17"/><line x1="9" y1="19.5" x2="15" y2="19.5"/></svg>`;
        if (n.includes("fpga") || n.includes("board") || n.includes("de0"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="6" width="20" height="12" rx="2"/><rect x="6" y="9" width="4" height="6" rx="1"/><rect x="14" y="9" width="4" height="6" rx="1"/><line x1="10" y1="12" x2="14" y2="12"/></svg>`;
        if (n.includes("sdr") || n.includes("usrp") || n.includes("radio"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M5 12.55a11 11 0 0114.08 0M1.42 9a16 16 0 0121.16 0M8.53 16.11a6 6 0 016.95 0M12 20h.01"/></svg>`;
        if (n.includes("raspberry") || n.includes("pi"))
          return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="4" y="4" width="16" height="16" rx="2"/><rect x="9" y="9" width="6" height="6" rx="1"/><line x1="9" y1="2" x2="9" y2="4"/><line x1="15" y1="2" x2="15" y2="4"/><line x1="9" y1="20" x2="9" y2="22"/><line x1="15" y1="20" x2="15" y2="22"/></svg>`;
        return `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="3" y="3" width="18" height="18" rx="2"/><line x1="3" y1="9" x2="21" y2="9"/><line x1="3" y1="15" x2="21" y2="15"/><line x1="9" y1="3" x2="9" y2="21"/><line x1="15" y1="3" x2="15" y2="21"/></svg>`;
      }

      function getStatusBadge(status) {
        const map = {
          AVAILABLE: ["Available", "status-available"],
          RESERVED: ["In Use", "status-inuse"],
          MAINTENANCE: ["Maintenance", "status-maintenance"],
          UNAVAILABLE: ["Unavailable", "status-unavailable"],
        };
        const [label, cls] = map[status] || ["Unknown", "status-unavailable"];
        return `<span class="status-badge ${cls}">${label}</span>`;
      }

      // ── RENDER EQUIPMENT ──
      function renderEquipment(items) {
        const grid = document.getElementById("equipment-grid");
        if (!items.length) {
          grid.innerHTML = '<div class="loading">No equipment found.</div>';
          return;
        }
        grid.innerHTML = items
          .map((eq) => {
            const isAvailable = eq.status === "AVAILABLE";
            const btnClass = isAvailable
              ? "btn-book-orange"
              : "btn-book-disabled";
            const btnText = isAvailable
              ? "Book Now"
              : eq.status === "MAINTENANCE"
                ? "Maintenance"
                : "Unavailable";
            const category = eq.description
              ? eq.description.split("—")[0].trim()
              : "Equipment";
            return `
        <div class="equipment-card" onclick="openBookingModal(${eq.id}, '${eq.name.replace(/'/g, "\\'")}', 'equipment', ${isAvailable})">
          <div class="card-top">
            <div class="card-icon">${getEquipmentIcon(eq.name)}</div>
            <div class="card-info">
              <div class="card-name">${eq.name}</div>
              <div class="card-category">${category}</div>
            </div>
            ${getStatusBadge(eq.status)}
          </div>
          <div class="card-meta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
            Multiple Labs
          </div>
          <div class="card-meta">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/><line x1="7" y1="7" x2="7.01" y2="7"/></svg>
            Qty: ${eq.quantity || "N/A"}
          </div>
          <div class="card-actions">
            <button class="btn-book ${btnClass}" onclick="event.stopPropagation(); openBookingModal(${eq.id}, '${eq.name.replace(/'/g, "\\'")}', 'equipment', ${isAvailable})" ${!isAvailable ? "disabled" : ""}>${btnText}</button>
          </div>
        </div>`;
          })
          .join("");
      }

      // ── RENDER LABS ──
      function renderLabs(labs) {
        const list = document.getElementById("labs-list");
        if (!labs.length) {
          list.innerHTML = '<div class="loading">No labs found.</div>';
          return;
        }
        list.innerHTML = labs
          .map((lab) => {
            const isAvailable = lab.status === "AVAILABLE";
            const btnClass = isAvailable ? "" : "btn-reserve-disabled";
            const btnText = isAvailable ? "Reserve Room" : "Fully Booked";
            return `
        <div class="lab-card">
          <div class="lab-icon">
            <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/><polyline points="9 22 9 12 15 12 15 22"/></svg>
          </div>
          <div class="lab-info">
            <div class="lab-name">${lab.labName}</div>
            <div class="lab-location">${lab.location}</div>
          </div>
          <div class="lab-right">
            ${getStatusBadge(lab.status)}
            <button class="btn-reserve ${btnClass}" onclick="openBookingModal(${lab.id}, '${lab.labName.replace(/'/g, "\\'")}', 'lab', ${isAvailable})" ${!isAvailable ? "disabled" : ""}>${btnText}</button>
          </div>
        </div>`;
          })
          .join("");
      }

      // ── FILTER ──
      function setFilter(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        applyFilters();
      }

      function applyFilters() {
        const search = document
          .getElementById("search-input")
          .value.toLowerCase();
        let filteredEq = allEquipment.filter(
          (e) =>
            e.name.toLowerCase().includes(search) ||
            (e.description || "").toLowerCase().includes(search),
        );
        let filteredLabs = allLabs.filter(
          (l) =>
            l.labName.toLowerCase().includes(search) ||
            (l.location || "").toLowerCase().includes(search),
        );
        if (currentFilter === "available") {
          filteredEq = filteredEq.filter((e) => e.status === "AVAILABLE");
          filteredLabs = filteredLabs.filter((l) => l.status === "AVAILABLE");
        }
        const showEq = currentFilter !== "labs";
        const showLabs = currentFilter !== "equipment";
        document.getElementById("equipment-section").style.display = showEq
          ? ""
          : "none";
        document.getElementById("labs-section").style.display = showLabs
          ? ""
          : "none";
        if (showEq) renderEquipment(filteredEq);
        if (showLabs) renderLabs(filteredLabs);
      }

      function switchTab(tab) {
        currentTab = tab;
        document
          .querySelectorAll(".tab")
          .forEach((t) => t.classList.remove("active"));
        document.getElementById("tab-" + tab).classList.add("active");
        if (tab === "all") {
          currentFilter = "all";
        } else if (tab === "equipment") {
          currentFilter = "equipment";
        } else {
          currentFilter = "labs";
        }
        applyFilters();
      }

      function sortItems() {
        const sort = document.getElementById("sort-select").value;
        if (sort === "name") {
          allEquipment.sort((a, b) => a.name.localeCompare(b.name));
          allLabs.sort((a, b) => a.labName.localeCompare(b.labName));
        } else if (sort === "availability") {
          allEquipment.sort((a, b) => (a.status === "AVAILABLE" ? -1 : 1));
          allLabs.sort((a, b) => (a.status === "AVAILABLE" ? -1 : 1));
        } else if (sort === "quantity") {
          allEquipment.sort((a, b) => (b.quantity || 0) - (a.quantity || 0));
        }
        applyFilters();
      }

      document
        .getElementById("search-input")
        .addEventListener("input", applyFilters);

      // ── BOOKING MODAL ──
      function populateLabSelect() {
        const sel = document.getElementById("booking-lab");
        allLabs.forEach((lab) => {
          const opt = document.createElement("option");
          opt.value = lab.id;
          opt.textContent = lab.labName;
          sel.appendChild(opt);
        });
      }

      async function openBookingModal(id, name, type, isAvailable) {
        if (!isAvailable) return;
        selectedItem = id;
        selectedType = type;
        document.getElementById("modal-title").textContent =
          type === "lab" ? `Reserve ${name}` : `Book ${name}`;
        document.getElementById("modal-sub").textContent =
          type === "lab"
            ? "Select your reservation time slot"
            : "Select time slot and lab";
        document.getElementById("modal-alert").classList.remove("show");

        if (type === "equipment") {
          document.getElementById("lab-select-wrap").style.display = "";
          // Fetch only labs that have this equipment
          const sel = document.getElementById("booking-lab");
          sel.innerHTML = '<option value="">-- Select Lab --</option>';
          const res = await fetch(`${API}/catalog/equipment/${id}/labs`, {
            headers: { Authorization: "Bearer " + token },
          });
          const labs = await res.json();
          labs.forEach((lab) => {
            const opt = document.createElement("option");
            opt.value = lab.id;
            opt.textContent = lab.labName;
            sel.appendChild(opt);
          });
        } else {
          document.getElementById("lab-select-wrap").style.display = "none";
        }
        document.getElementById("quantity-wrap").style.display =
          type === "lab" ? "" : "none";

        document.getElementById("booking-modal").classList.add("show");
      }

      function closeModal() {
        document.getElementById("booking-modal").classList.remove("show");
        selectedItem = null;
        selectedType = null;
      }

      function showModalAlert(type, msg) {
        const el = document.getElementById("modal-alert");
        el.className = `alert ${type} show`;
        el.textContent = msg;
      }

      async function confirmBooking() {
        const date = document.getElementById("booking-date").value;
        const start = document.getElementById("booking-start").value;
        const end = document.getElementById("booking-end").value;
        const labId = document.getElementById("booking-lab").value;

        if (!date || !start || !end)
          return showModalAlert("error", "Please fill in all fields");
        if (start >= end)
          return showModalAlert("error", "End time must be after start time");
        if (selectedType === "lab") {
          const qty = parseInt(
            document.getElementById("booking-quantity").value,
          );
          if (!qty || qty < 1 || qty > 3)
            return showModalAlert(
              "error",
              "You can reserve between 1 and 3 workstations only",
            );
          body.quantity = qty;
        }
        if (selectedType === "equipment" && !labId)
          return showModalAlert("error", "Please select a lab");

        const body = {
          startTime: `${date}T${start}:00`,
          endTime: `${date}T${end}:00`,
        };

        if (selectedType === "equipment") {
          body.equipmentId = selectedItem;
          body.labId = parseInt(labId);
        } else {
          body.labId = selectedItem;
        }

        try {
          document.getElementById("confirm-btn").textContent = "Booking...";
          document.getElementById("confirm-btn").disabled = true;
          const res = await fetch(`${API}/reservations`, {
            method: "POST",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify(body),
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Booking failed");
          }
          closeModal();
          showAlert(
            "success",
            "Booking confirmed! Check My Reservations for details.",
          );
          fetchAll();
        } catch (e) {
          showModalAlert("error", e.message);
        } finally {
          document.getElementById("confirm-btn").textContent =
            "Confirm Booking";
          document.getElementById("confirm-btn").disabled = false;
        }
      }

      function showAlert(type, msg) {
        const el = document.getElementById("main-alert");
        el.className = `alert ${type} show`;
        el.textContent = msg;
        setTimeout(() => el.classList.remove("show"), 4000);
      }

      // Close modal on overlay click
      document
        .getElementById("booking-modal")
        .addEventListener("click", function (e) {
          if (e.target === this) closeModal();
        });

      // ── INIT ──
      fetchAll();
    </script>
    <script src="/calendar.js"></script>
    <script src="/notifications.js"></script>
  </body>
</html>
