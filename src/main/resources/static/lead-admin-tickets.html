<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Issue Tickets — Lab Management System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="/theme.js"></script>
  <style>
    *,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
    :root{--orange:#f97316;--orange2:#ea6c0a;--orange3:#fb923c;--text:#1a1a2e;--text2:#64748b;--text3:#94a3b8;--border:#e2e8f0;--white:#ffffff;--bg:#f8fafc;--font:"Plus Jakarta Sans",sans-serif;}
    [data-theme="dark"]{--text:#f1f5f9;--text2:#cbd5e1;--text3:#94a3b8;--border:#334155;--white:#1e293b;--bg:#0f172a;}
    body{font-family:var(--font);background:var(--bg);min-height:100vh;display:flex;}

    .sidebar{width:240px;min-height:100vh;flex-shrink:0;background:linear-gradient(180deg,#1a1a2e 0%,#0f172a 100%);display:flex;flex-direction:column;padding:24px 0;position:fixed;left:0;top:0;bottom:0;z-index:100;}
    .sidebar-brand{padding:0 20px 28px;border-bottom:1px solid rgba(255,255,255,0.08);margin-bottom:16px;}
    .brand-row{display:flex;align-items:center;gap:10px;}
    .brand-icon{width:38px;height:38px;background:rgba(249,115,22,0.2);border-radius:10px;display:flex;align-items:center;justify-content:center;}
    .brand-icon svg{width:20px;height:20px;}
    .brand-name{font-size:14px;font-weight:700;color:white;line-height:1.2;}
    .brand-sub{font-size:10px;color:rgba(249,115,22,0.8);font-weight:600;text-transform:uppercase;letter-spacing:0.08em;margin-top:2px;}
    .nav-section{padding:0 12px;flex:1;}
    .nav-label{margin:16px 0 6px 12px;font-size:10px;font-weight:700;color:rgba(255,255,255,0.3);text-transform:uppercase;letter-spacing:0.08em;}
    .nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:10px;margin-bottom:4px;color:rgba(255,255,255,0.55);font-size:13px;font-weight:500;cursor:pointer;transition:all 0.2s;text-decoration:none;}
    .nav-item:hover{background:rgba(255,255,255,0.08);color:rgba(255,255,255,0.9);}
    .nav-item.active{background:rgba(249,115,22,0.15);color:#fb923c;font-weight:600;border-left:3px solid var(--orange);}
    .nav-item svg{width:16px;height:16px;flex-shrink:0;}
    .sidebar-user{margin:16px 12px 0;padding:12px;border-radius:12px;background:rgba(249,115,22,0.1);border:1px solid rgba(249,115,22,0.2);display:flex;align-items:center;gap:10px;}
    .user-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,var(--orange),var(--orange2));display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;flex-shrink:0;}
    .user-name{font-size:13px;font-weight:600;color:white;}
    .user-role{font-size:11px;color:rgba(249,115,22,0.8);}

    .main{margin-left:240px;flex:1;display:flex;flex-direction:column;min-height:100vh;}
    .topbar{background:var(--white);border-bottom:1px solid var(--border);padding:16px 32px;display:flex;align-items:center;justify-content:space-between;position:sticky;top:0;z-index:50;}
    .topbar-left{display:flex;align-items:center;gap:12px;}
    .topbar-title{font-size:20px;font-weight:700;color:var(--text);}
    .topbar-badge{font-size:11px;font-weight:700;padding:4px 10px;border-radius:999px;background:rgba(249,115,22,0.1);color:var(--orange);border:1px solid rgba(249,115,22,0.2);}
    .topbar-right{display:flex;align-items:center;gap:12px;}
    .topbar-date{padding:8px 14px;border:1px solid var(--border);border-radius:10px;font-size:13px;color:var(--text2);background:var(--bg);}
    .topbar-icon{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;background:var(--white);color:var(--text2);position:relative;}
    .theme-toggle{width:36px;height:36px;border-radius:50%;border:1px solid var(--border);background:var(--white);cursor:pointer;display:flex;align-items:center;justify-content:center;transition:all 0.2s;}
    .topbar-avatar{width:36px;height:36px;border-radius:50%;background:linear-gradient(135deg,#1a1a2e,#1e293b);display:flex;align-items:center;justify-content:center;font-size:13px;font-weight:700;color:white;cursor:pointer;text-decoration:none;}
    .notif-dot{width:8px;height:8px;background:var(--orange);border-radius:50%;position:absolute;top:6px;right:6px;border:2px solid var(--white);}

    .content{padding:28px 32px;flex:1;}

    .stats-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:16px;margin-bottom:28px;}
    .stat-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:20px;border-top:4px solid transparent;}
    .stat-card.total{border-top-color:#64748b;}
    .stat-card.open{border-top-color:#ef4444;}
    .stat-card.progress{border-top-color:#f59e0b;}
    .stat-card.resolved{border-top-color:#10b981;}
    .stat-label{font-size:12px;font-weight:600;color:var(--text2);text-transform:uppercase;letter-spacing:0.04em;margin-bottom:10px;}
    .stat-value{font-size:32px;font-weight:700;color:var(--text);line-height:1;}

    .section-card{background:var(--white);border:1px solid var(--border);border-radius:16px;padding:24px;}
    .section-header{display:flex;align-items:center;justify-content:space-between;margin-bottom:20px;}
    .section-title{font-size:16px;font-weight:700;color:var(--text);}

    .toolbar{display:flex;gap:12px;margin-bottom:16px;align-items:center;flex-wrap:wrap;}
    .search-bar{padding:9px 16px;border:1.5px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13px;outline:none;width:260px;background:var(--bg);color:var(--text);}
    .search-bar:focus{border-color:var(--orange);}
    .filter-select{padding:9px 14px;border:1px solid var(--border);border-radius:10px;font-family:var(--font);font-size:13px;background:var(--white);color:var(--text);outline:none;}

    .ticket-card{background:var(--white);border:1px solid var(--border);border-radius:14px;padding:16px 20px;display:flex;align-items:center;gap:16px;margin-bottom:10px;transition:all 0.2s;}
    .ticket-card:hover{box-shadow:0 4px 16px rgba(0,0,0,0.06);border-color:#cbd5e1;}
    .ticket-id{font-size:12px;font-weight:700;color:var(--orange);background:#fff7ed;border:1px solid #fed7aa;border-radius:8px;padding:6px 10px;flex-shrink:0;}
    .ticket-info{flex:1;min-width:0;}
    .ticket-title{font-size:15px;font-weight:600;color:var(--text);margin-bottom:4px;}
    .ticket-meta{font-size:13px;color:var(--text2);display:flex;gap:12px;align-items:center;flex-wrap:wrap;}
    .meta-divider{width:4px;height:4px;border-radius:50%;background:var(--border);}
    .ticket-badges{display:flex;flex-direction:column;align-items:flex-end;gap:6px;width:120px;flex-shrink:0;}
    .ticket-action{flex-shrink:0;margin-left:10px;}

    .btn-resolve{padding:8px 16px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--orange),var(--orange2));color:white;font-family:var(--font);font-size:13px;font-weight:600;cursor:pointer;transition:0.2s;}
    .btn-resolve:hover{opacity:0.9;}
    .btn-resolved{padding:8px 16px;border-radius:8px;border:1px solid var(--border);background:var(--bg);color:var(--text3);font-family:var(--font);font-size:13px;font-weight:600;cursor:not-allowed;}

    .badge{font-size:11px;font-weight:600;padding:3px 10px;border-radius:20px;}
    .status-open{background:#fef2f2;color:#b91c1c;border:1px solid #fecaca;}
    .status-in_progress{background:#fffbeb;color:#b45309;border:1px solid #fde68a;}
    .status-resolved{background:#f0fdf4;color:#15803d;border:1px solid #bbf7d0;}
    .status-closed{background:#f1f5f9;color:#475569;border:1px solid #e2e8f0;}
    .priority-low{background:#f0fdf4;color:#15803d;}
    .priority-medium{background:#fffbeb;color:#92400e;}
    .priority-high{background:#fff1f2;color:#991b1b;}
    .priority-urgent{background:#7f1d1d;color:#fecaca;}

    .empty-state{text-align:center;padding:60px;color:var(--text3);font-size:14px;background:var(--white);border:1px dashed var(--border);border-radius:14px;}
    .spinner-center{display:flex;justify-content:center;padding:40px;}
    .spinner{width:30px;height:30px;border:3px solid var(--border);border-top-color:var(--orange);border-radius:50%;animation:spin 0.8s linear infinite;}

    .modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,0.5);display:none;align-items:center;justify-content:center;z-index:200;padding:20px;}
    .modal-overlay.show{display:flex;}
    .modal{background:var(--white);border-radius:18px;width:100%;max-width:460px;padding:28px;box-shadow:0 20px 60px rgba(0,0,0,0.18);position:relative;}
    .modal-title{font-size:17px;font-weight:700;color:var(--text);margin-bottom:20px;}
    .modal-close{position:absolute;top:18px;right:20px;width:28px;height:28px;border-radius:50%;background:var(--bg);border:1px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;font-size:14px;color:var(--text2);}
    .modal-close:hover{background:#fee2e2;color:#be123c;}
    .form-group{margin-bottom:14px;}
    .form-group label{display:block;font-size:11px;font-weight:700;color:var(--text);text-transform:uppercase;letter-spacing:0.05em;margin-bottom:6px;}
    .form-control{width:100%;padding:10px 14px;border:1.5px solid var(--border);border-radius:8px;font-family:var(--font);font-size:13px;color:var(--text);background:var(--bg);outline:none;}
    .form-control:focus{border-color:var(--orange);}
    textarea.form-control{resize:vertical;min-height:80px;}
    .modal-actions{display:flex;justify-content:flex-end;gap:10px;margin-top:20px;padding-top:16px;border-top:1px solid var(--border);}
    .btn-cancel-modal{padding:10px 18px;border-radius:8px;border:1.5px solid var(--border);background:var(--white);font-family:var(--font);font-size:13px;font-weight:600;color:var(--text2);cursor:pointer;}
    .btn-submit-modal{padding:10px 22px;border-radius:8px;border:none;background:linear-gradient(135deg,var(--orange),var(--orange2));font-family:var(--font);font-size:13px;font-weight:600;color:white;cursor:pointer;}

    @keyframes spin{to{transform:rotate(360deg);}}
    @media(max-width:768px){.sidebar{display:none;}.main{margin-left:0;}.content{padding:20px 16px;}.stats-grid{grid-template-columns:repeat(2,1fr);}}
  </style>
</head>
<body>
  <aside class="sidebar">
    <div class="sidebar-brand">
      <div class="brand-row">
        <div class="brand-icon">
          <svg viewBox="0 0 32 32" fill="none" stroke="#f97316" stroke-width="1.8" stroke-linecap="round" stroke-linejoin="round">
            <line x1="4" y1="16" x2="12" y2="16"/><line x1="12" y1="9" x2="12" y2="23"/>
            <line x1="12" y1="10.5" x2="26" y2="5"/><line x1="12" y1="21.5" x2="26" y2="27"/>
            <polygon points="22,24.5 26,27 23.5,22.5" fill="#f97316" stroke="none"/>
            <line x1="26" y1="5" x2="26" y2="2"/><line x1="26" y1="27" x2="26" y2="30"/>
          </svg>
        </div>
        <div>
          <div class="brand-name">Laboratory Management System</div>
          <div class="brand-sub">Lead Admin</div>
        </div>
      </div>
    </div>
    <nav class="nav-section">
      <div class="nav-label">Overview</div>
      <a href="/lead-admin-dashboard.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/></svg>
        Dashboard
      </a>
      <div class="nav-label">Management</div>
      
      <a href="/lead-admin-tickets.html" class="nav-item active">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><line x1="12" y1="8" x2="12" y2="12"/><line x1="12" y1="16" x2="12.01" y2="16"/></svg>
        Issue Tickets
      </a>
      <a href="/lead-admin-users.html" class="nav-item">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 010 7.75"/></svg>
        Manage Staff
      </a>
    </nav>
    <div class="sidebar-user">
      <div class="user-avatar" id="sidebar-avatar">LA</div>
      <div>
        <div class="user-name" id="sidebar-name">Lead Admin</div>
        <div class="user-role">System Administrator</div>
      </div>
    </div>
  </aside>

  <div class="main">
    <div class="topbar">
      <div class="topbar-left">
        <div class="topbar-title">Issue Tickets</div>
        <span class="topbar-badge">ADMIN</span>
      </div>
      <div class="topbar-right">
        <div class="topbar-date" id="topbar-date"></div>
        <button id="theme-btn" class="theme-toggle" type="button" title="Toggle theme"></button>
        <div class="topbar-icon">
          <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"/></svg>
          <div class="notif-dot"></div>
        </div>
        <a href="/profile-admin.html" style="text-decoration:none;">
          <div class="topbar-avatar" id="topbar-avatar">LA</div>
        </a>
      </div>
    </div>

    <div class="content">
      <div class="stats-grid">
        <div class="stat-card total">
          <div class="stat-label">Total Tickets</div>
          <div class="stat-value" id="stat-total">—</div>
        </div>
        <div class="stat-card open">
          <div class="stat-label">Open</div>
          <div class="stat-value" id="stat-open">—</div>
        </div>
        <div class="stat-card progress">
          <div class="stat-label">In Progress</div>
          <div class="stat-value" id="stat-progress">—</div>
        </div>
        <div class="stat-card resolved">
          <div class="stat-label">Resolved</div>
          <div class="stat-value" id="stat-resolved">—</div>
        </div>
      </div>

      <div class="section-card">
        <div class="section-header">
          <div class="section-title">All Issue Tickets</div>
        </div>
        <div class="toolbar">
          <input type="text" class="search-bar" id="searchInput" placeholder="Search ticket ID or title..."/>
          <select class="filter-select" id="filterPriority" onchange="renderTickets()">
            <option value="ALL">All Priorities</option>
            <option value="LOW">Low</option>
            <option value="MEDIUM">Medium</option>
            <option value="HIGH">High</option>
            <option value="URGENT">Urgent</option>
          </select>
        </div>
        <div id="tickets-container">
          <div class="spinner-center"><div class="spinner"></div></div>
        </div>
      </div>
    </div>
  </div>

  <!-- RESOLVE MODAL -->
  <div class="modal-overlay" id="resolveModal">
    <div class="modal">
      <div class="modal-close" onclick="closeModal()">✕</div>
      <div class="modal-title">Resolve <span id="resolveTicketIdDisplay"></span></div>
      <input type="hidden" id="resolveTicketId"/>
      <div class="form-group">
        <label>Resolution Details</label>
        <textarea class="form-control" id="resolveDetails" placeholder="Describe how the issue was resolved..."></textarea>
      </div>
      <div class="form-group">
        <label>Internal Notes</label>
        <textarea class="form-control" id="resolveNotes" placeholder="Any internal notes..."></textarea>
      </div>
      <div class="modal-actions">
        <button class="btn-cancel-modal" onclick="closeModal()">Cancel</button>
        <button class="btn-submit-modal" onclick="submitResolution()">Mark as Resolved</button>
      </div>
    </div>
  </div>

  <script>
    const API = "/api";
    const token = sessionStorage.getItem("token");
    const username = sessionStorage.getItem("username");
    const role = sessionStorage.getItem("role");
    if (!token) window.location.href = "/login.html";
    if (role !== "ADMIN") window.location.href = "/admin-dashboard.html";

    if (username) {
      const i = username.substring(0,2).toUpperCase();
      document.getElementById("sidebar-avatar").textContent = i;
      document.getElementById("topbar-avatar").textContent = i;
      document.getElementById("sidebar-name").textContent = username;
    }
    document.getElementById("topbar-date").textContent = new Date().toLocaleDateString("en-GB",{weekday:"short",day:"numeric",month:"long",year:"numeric"});

    let allTickets = [];

    document.getElementById("searchInput").addEventListener("input", renderTickets);

    async function loadTickets() {
      try {
        const res = await fetch(`${API}/admin/tickets`,{headers:{Authorization:"Bearer "+token}});
        if (!res.ok) throw new Error("Failed");
        allTickets = await res.json();
        updateStats();
        renderTickets();
      } catch(e) {
        document.getElementById("tickets-container").innerHTML = `<div class="empty-state">Failed to load tickets.</div>`;
        ["stat-total","stat-open","stat-progress","stat-resolved"].forEach(id=>document.getElementById(id).textContent="0");
      }
    }

    function updateStats() {
      document.getElementById("stat-total").textContent = allTickets.length;
      document.getElementById("stat-open").textContent = allTickets.filter(t=>t.originalIssue?.status==="OPEN"||(!t.originalIssue&&!t.resolutionDetails)).length;
      document.getElementById("stat-progress").textContent = allTickets.filter(t=>t.originalIssue?.status==="IN_PROGRESS").length;
      document.getElementById("stat-resolved").textContent = allTickets.filter(t=>t.resolutionDetails||t.originalIssue?.status==="RESOLVED"||t.originalIssue?.status==="CLOSED").length;
    }

    function renderTickets() {
      const q = document.getElementById("searchInput").value.toLowerCase();
      const pf = document.getElementById("filterPriority").value;
      let filtered = allTickets.filter(t=>{
        const title = (t.title||t.originalIssue?.title||"").toLowerCase();
        const matchQ = title.includes(q)||String(t.id).includes(q);
        const matchP = pf==="ALL"||(t.adminPriority||"MEDIUM")===pf;
        return matchQ&&matchP;
      });
      filtered.sort((a,b)=>new Date(b.assignmentDate||0)-new Date(a.assignmentDate||0));

      const container = document.getElementById("tickets-container");
      if (!filtered.length){container.innerHTML=`<div class="empty-state">No tickets found.</div>`;return;}

      container.innerHTML = filtered.map(ticket=>{
        const isInternal = !ticket.originalIssue;
        const title = ticket.title||ticket.originalIssue?.title||"Untitled";
        const priority = ticket.adminPriority||"MEDIUM";
        const isResolved = !!(ticket.resolutionDetails||ticket.originalIssue?.status==="RESOLVED"||ticket.originalIssue?.status==="CLOSED");
        const status = isResolved?"RESOLVED":ticket.originalIssue?.status||"OPEN";
        const statusClass = "status-"+status.toLowerCase().replace("_","-");
        const priorityClass = "priority-"+priority.toLowerCase();
        const date = ticket.assignmentDate?new Date(ticket.assignmentDate).toLocaleDateString("en-GB",{day:"numeric",month:"short",year:"numeric"}):"—";
        const equipment = ticket.equipment?.name||ticket.originalIssue?.equipment?.name||"";
        const submittedBy = ticket.assignedTo?.username||"Lab Tech";
        const typeLabel = isInternal?"Internal Ticket":"Student Issue";

        const actionBtn = isResolved
          ? `<button class="btn-resolved" disabled>Resolved</button>`
          : `<button class="btn-resolve" onclick="openResolve(${ticket.id})">Resolve</button>`;

        return `
          <div class="ticket-card">
            <div class="ticket-id">TCK-${String(ticket.id).padStart(3,"0")}</div>
            <div class="ticket-info">
              <div class="ticket-title">${title}</div>
              <div class="ticket-meta">
                <span>${typeLabel}</span>
                ${equipment?`<div class="meta-divider"></div><span>${equipment}</span>`:""}
                <div class="meta-divider"></div>
                <span>By ${submittedBy}</span>
                <div class="meta-divider"></div>
                <span>${date}</span>
              </div>
            </div>
            <div class="ticket-badges">
              <span class="badge ${statusClass}">${status.replace("_"," ")}</span>
              <span class="badge ${priorityClass}">${priority}</span>
            </div>
            <div class="ticket-action">${actionBtn}</div>
          </div>`;
      }).join("");
    }

    function openResolve(id) {
      document.getElementById("resolveTicketId").value = id;
      document.getElementById("resolveTicketIdDisplay").textContent = `TCK-${String(id).padStart(3,"0")}`;
      document.getElementById("resolveDetails").value = "";
      document.getElementById("resolveNotes").value = "";
      document.getElementById("resolveModal").classList.add("show");
    }
    function closeModal(){document.getElementById("resolveModal").classList.remove("show");}

    async function submitResolution() {
      const id = document.getElementById("resolveTicketId").value;
      try {
        const res = await fetch(`${API}/admin/tickets/${id}/resolve`,{
          method:"PATCH",
          headers:{"Content-Type":"application/json",Authorization:"Bearer "+token},
          body:JSON.stringify({resolution:document.getElementById("resolveDetails").value,notes:document.getElementById("resolveNotes").value})
        });
        if (!res.ok){const d=await res.json();throw new Error(d.error||"Failed");}
        closeModal();
        loadTickets();
      } catch(e){alert("Error: "+e.message);}
    }

    loadTickets();
  </script>
  <script src="/notifications.js"></script>
</body>
</html>
