<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Reset Password — Lab Reservation System</title>
  <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;500;600;700&display=swap" rel="stylesheet"/>
  <script src="/logo.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    :root {
      --orange: #f97316; --orange2: #ea6c0a; --orange3: #fb923c;
      --text: #1a1a2e; --text2: #64748b; --text3: #94a3b8;
      --border: #e2e8f0; --white: #ffffff;
      --font: "Plus Jakarta Sans", sans-serif;
    }
    body {
      font-family: var(--font); background: linear-gradient(135deg, #fff7ed 0%, #ffedd5 50%, #fed7aa 100%);
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      position: relative; overflow: hidden;
    }
    body::before {
      content: ""; position: absolute; width: 600px; height: 600px; border-radius: 50%;
      background: radial-gradient(circle, rgba(249,115,22,0.15) 0%, transparent 70%);
      top: -200px; right: -200px;
    }
    .card {
      position: relative; z-index: 1; background: var(--white);
      border-radius: 24px; padding: 48px 44px; width: 100%; max-width: 420px;
      box-shadow: 0 20px 60px rgba(249,115,22,0.15), 0 4px 20px rgba(0,0,0,0.08);
      margin: 20px;
    }
    .logo-wrap { display: flex; flex-direction: column; align-items: center; gap: 12px; margin-bottom: 32px; text-align: center; }
    .card-title { font-size: 20px; font-weight: 700; color: var(--text); }
    .card-sub { font-size: 13px; color: var(--text2); margin-bottom: 24px; text-align: center; }
    .field { display: flex; flex-direction: column; gap: 6px; margin-bottom: 16px; }
    .field label { font-size: 12px; font-weight: 600; color: var(--text); letter-spacing: 0.02em; text-transform: uppercase; }
    .field input {
      padding: 12px 16px; border: 1.5px solid var(--border); border-radius: 10px;
      font-family: var(--font); font-size: 14px; color: var(--text); outline: none;
      transition: border-color 0.2s, box-shadow 0.2s; background: #fafafa; width: 100%;
    }
    .field input::placeholder { color: var(--text3); }
    .field input:focus { border-color: var(--orange); box-shadow: 0 0 0 3px rgba(249,115,22,0.12); background: var(--white); }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 44px; }
    .pw-toggle {
      position: absolute; right: 14px; top: 50%; transform: translateY(-50%);
      background: none; border: none; cursor: pointer; color: var(--text3); display: flex; align-items: center;
    }
    .pw-toggle:hover { color: var(--orange); }
    .btn {
      width: 100%; padding: 14px;
      background: linear-gradient(135deg, var(--orange), var(--orange2));
      border: none; border-radius: 10px; color: white;
      font-family: var(--font); font-size: 15px; font-weight: 600;
      cursor: pointer; transition: all 0.2s;
      box-shadow: 0 4px 16px rgba(249,115,22,0.35); margin-bottom: 16px;
    }
    .btn:hover { transform: translateY(-1px); }
    .btn:disabled { opacity: 0.6; cursor: not-allowed; transform: none; }
    .btn .spinner { display:none; width:18px; height:18px; border:2px solid rgba(255,255,255,0.4); border-top-color:white; border-radius:50%; animation:spin 0.6s linear infinite; margin:0 auto; }
    @keyframes spin { to { transform: rotate(360deg); } }
    .btn.loading .btn-text { display: none; }
    .btn.loading .spinner { display: block; }
    .alert { padding: 10px 14px; border-radius: 8px; font-size: 13px; margin-bottom: 16px; display: none; }
    .alert.show { display: block; }
    .alert.success { background: #f0fdf4; border: 1px solid #bbf7d0; color: #166534; }
    .alert.error   { background: #fff1f2; border: 1px solid #fecdd3; color: #be123c; }
    .back-link { text-align: center; font-size: 13px; color: var(--text2); }
    .back-link a { color: var(--orange); font-weight: 600; text-decoration: none; cursor: pointer; }
    #reset-form { display: none; }
    #reset-form.show { display: block; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo-wrap">
      <lab-logo size="56" show-name="false"></lab-logo>
      <div class="card-title" id="page-title">Forgot Password</div>
    </div>

    <div id="main-alert" class="alert"></div>

    <!-- Step 1: Enter email -->
    <div id="email-form">
      <p class="card-sub">Enter your registered email and we'll send you a reset link.</p>
      <div class="field">
        <label>Email</label>
        <input type="email" id="fp-email" placeholder="your@email.com"/>
      </div>
      <button class="btn" id="send-btn" onclick="sendResetLink()">
        <span class="btn-text">Send Reset Link</span>
        <div class="spinner"></div>
      </button>
      <div class="back-link"><a href="/">Back to Login</a></div>
    </div>

    <!-- Step 2: Enter new password (shown after clicking email link) -->
    <div id="reset-form">
      <p class="card-sub">Enter your new password below.</p>
      <div class="field">
        <label>New Password</label>
        <div class="pw-wrap">
          <input type="password" id="new-password" placeholder="New password"/>
          <button class="pw-toggle" onclick="togglePw('new-password',this)" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <div class="field">
        <label>Confirm Password</label>
        <div class="pw-wrap">
          <input type="password" id="confirm-password" placeholder="Confirm password"/>
          <button class="pw-toggle" onclick="togglePw('confirm-password',this)" type="button">
            <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2">
              <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/>
            </svg>
          </button>
        </div>
      </div>
      <button class="btn" id="reset-btn" onclick="resetPassword()">
        <span class="btn-text">Reset Password</span>
        <div class="spinner"></div>
      </button>
      <div class="back-link"><a href="/">Back to Login</a></div>
    </div>
  </div>

  <script>
    const API = "http://localhost:8080/api/auth";

    // Check if token is in URL — if yes show reset form
    const urlParams = new URLSearchParams(window.location.search);
    const token = urlParams.get("token");
    if (token) {
      document.getElementById("email-form").style.display = "none";
      document.getElementById("reset-form").classList.add("show");
      document.getElementById("page-title").textContent = "Reset Password";
    }

    function showAlert(type, msg) {
      const el = document.getElementById("main-alert");
      el.className = `alert ${type} show`;
      el.textContent = msg;
      setTimeout(() => el.classList.remove("show"), 5000);
    }

    function setLoading(btnId, on) {
      const b = document.getElementById(btnId);
      b.classList.toggle("loading", on);
      b.disabled = on;
    }

    function togglePw(id, btn) {
      const inp = document.getElementById(id);
      inp.type = inp.type === "password" ? "text" : "password";
      btn.style.color = inp.type === "text" ? "var(--orange)" : "";
    }

    async function sendResetLink() {
      const email = document.getElementById("fp-email").value.trim();
      if (!email) return showAlert("error", "Please enter your email");
      setLoading("send-btn", true);
      try {
        const res = await fetch(`${API}/forgot-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ email })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Something went wrong");
        showAlert("success", "Reset link sent! Check your email.");
        document.getElementById("fp-email").value = "";
      } catch(e) {
        showAlert("error", e.message);
      } finally {
        setLoading("send-btn", false);
      }
    }

    async function resetPassword() {
      const password = document.getElementById("new-password").value;
      const confirm  = document.getElementById("confirm-password").value;
      if (!password) return showAlert("error", "Please enter a new password");
      if (password.length < 6) return showAlert("error", "Password must be at least 6 characters");
      if (password !== confirm) return showAlert("error", "Passwords do not match");
      setLoading("reset-btn", true);
      try {
        const res = await fetch(`${API}/reset-password`, {
          method: "POST",
          headers: { "Content-Type": "application/json" },
          body: JSON.stringify({ token, password })
        });
        const data = await res.json();
        if (!res.ok) throw new Error(data.error || "Reset failed");
        showAlert("success", "Password reset successfully! Redirecting to login...");
        setTimeout(() => window.location.href = "/", 2000);
      } catch(e) {
        showAlert("error", e.message);
      } finally {
        setLoading("reset-btn", false);
      }
    }
  </script>
</body>
</html>
