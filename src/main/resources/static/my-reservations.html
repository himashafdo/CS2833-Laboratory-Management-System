<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Reservations — Lab Management System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --orange: #f97316;
        --orange2: #ea6c0a;
        --orange3: #fb923c;
        --text: #1a1a2e;
        --text2: #64748b;
        --text3: #94a3b8;
        --border: #e2e8f0;
        --white: #ffffff;
        --bg: #f8fafc;
        --font: "Plus Jakarta Sans", sans-serif;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        flex-shrink: 0;
        background: linear-gradient(180deg, #f97316 0%, #c2410c 100%);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
      .sidebar-brand {
        padding: 0 20px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        margin-bottom: 16px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-icon {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-icon svg {
        width: 20px;
        height: 20px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 700;
        color: white;
        line-height: 1.2;
      }
      .nav-section {
        padding: 0 12px;
        flex: 1;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .nav-item.active {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        font-weight: 600;
      }
      .nav-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sidebar-user {
        margin: 16px 12px 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: white;
      }
      .user-role {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
      }

      /* ── MAIN ── */
      .main {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── TOPBAR ── */
      .topbar {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-date {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 13px;
        color: var(--text2);
        background: var(--bg);
        white-space: nowrap;
      }
      .topbar-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: var(--white);
        color: var(--text2);
      }
      .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange), var(--orange3));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
      }

      /* ── CONTENT ── */
      .content {
        padding: 28px 32px;
        flex: 1;
      }

      /* ── STATS ── */
      .stats-row {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 16px;
        margin-bottom: 24px;
      }
      .stat-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 18px 20px;
        display: flex;
        align-items: center;
        gap: 14px;
      }
      .stat-icon {
        width: 44px;
        height: 44px;
        border-radius: 12px;
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
      }
      .stat-icon svg {
        width: 20px;
        height: 20px;
      }
      .stat-icon.blue {
        background: #eff6ff;
        color: #3b82f6;
      }
      .stat-icon.amber {
        background: #fffbeb;
        color: #f59e0b;
      }
      .stat-icon.green {
        background: #f0fdf4;
        color: #22c55e;
      }
      .stat-icon.red {
        background: #fff1f2;
        color: #ef4444;
      }
      .stat-info {
      }
      .stat-value {
        font-size: 22px;
        font-weight: 700;
        color: var(--text);
      }
      .stat-label {
        font-size: 12px;
        color: var(--text2);
      }

      /* ── FILTERS ── */
      .filter-bar {
        display: flex;
        align-items: center;
        gap: 10px;
        margin-bottom: 20px;
        flex-wrap: wrap;
      }
      .filter-btn {
        padding: 7px 16px;
        border-radius: 20px;
        font-family: var(--font);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        border: 1.5px solid var(--border);
        background: var(--white);
        color: var(--text2);
      }
      .filter-btn:hover {
        border-color: var(--orange);
        color: var(--orange);
      }
      .filter-btn.active {
        background: var(--orange);
        border-color: var(--orange);
        color: white;
      }

      /* ── RESERVATION CARDS ── */
      .reservations-list {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .res-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 14px;
        padding: 20px 24px;
        display: flex;
        align-items: center;
        gap: 16px;
        transition: all 0.2s;
      }
      .res-card:hover {
        box-shadow: 0 4px 16px rgba(0, 0, 0, 0.06);
        border-color: #d1d5db;
      }
      .res-card.cancelled {
        opacity: 0.6;
      }

      .res-icon {
        width: 48px;
        height: 48px;
        border-radius: 12px;
        background: var(--bg);
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        flex-shrink: 0;
        color: var(--text2);
      }
      .res-icon svg {
        width: 22px;
        height: 22px;
      }

      .res-body {
        flex: 1;
        min-width: 0;
      }
      .res-name {
        font-size: 15px;
        font-weight: 600;
        color: var(--text);
        margin-bottom: 4px;
      }
      .res-meta {
        display: flex;
        align-items: center;
        gap: 16px;
        flex-wrap: wrap;
      }
      .res-meta-item {
        display: flex;
        align-items: center;
        gap: 5px;
        font-size: 12px;
        color: var(--text2);
      }
      .res-meta-item svg {
        width: 13px;
        height: 13px;
        flex-shrink: 0;
      }

      .res-right {
        display: flex;
        flex-direction: column;
        align-items: flex-end;
        gap: 8px;
        flex-shrink: 0;
      }

      .status-badge {
        font-size: 11px;
        font-weight: 600;
        padding: 4px 12px;
        border-radius: 20px;
      }
      .status-pending {
        background: #fef9c3;
        color: #854d0e;
      }
      .status-approved {
        background: #dcfce7;
        color: #15803d;
      }
      .status-cancelled {
        background: #f1f5f9;
        color: #64748b;
      }
      .status-completed {
        background: #eff6ff;
        color: #1d4ed8;
      }

      .btn-cancel {
        padding: 6px 14px;
        border-radius: 8px;
        font-family: var(--font);
        font-size: 12px;
        font-weight: 600;
        cursor: pointer;
        transition: all 0.2s;
        border: 1.5px solid #fecdd3;
        background: #fff1f2;
        color: #ef4444;
      }
      .btn-cancel:hover {
        background: #fecdd3;
      }

      .empty-state {
        text-align: center;
        padding: 60px;
        color: var(--text3);
        font-size: 14px;
      }
      .empty-icon {
        font-size: 48px;
        margin-bottom: 12px;
      }
      .empty-title {
        font-size: 16px;
        font-weight: 600;
        color: var(--text2);
        margin-bottom: 6px;
      }

      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .alert.show {
        display: block;
      }
      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
      }
      .alert.error {
        background: #fff1f2;
        border: 1px solid #fecdd3;
        color: #be123c;
      }

      .spinner {
        width: 32px;
        height: 32px;
        border: 3px solid var(--border);
        border-top-color: var(--orange);
        border-radius: 50%;
        animation: spin 0.8s linear infinite;
        margin: 0 auto 12px;
      }
      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 900px) {
        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .content {
          padding: 20px 16px;
        }
        .stats-row {
          grid-template-columns: repeat(2, 1fr);
        }
      }
    </style>
  </head>
  <body>
    <!-- ── SIDEBAR ── -->

              <line x1="12" y1="21.5" x2="26" y2="27" />

                points="22,24.5 26,27 23.5,22.5"

          <div><div class="brand-name">Laboratory Management System</div></div>

      </div>
      <nav class="nav-section">
        <a href="/student-dashboard.html" class="nav-item">

          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />

        </a>

          Equipment & Lab Spaces
        </a>

        </a>

        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">--</div>
        <div>
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-role" id="sidebar-role">Student</div>
        </div>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title">My Reservations</div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <div class="topbar-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
              />
            </svg>
          </div>
          <a href="/profile.html" style="text-decoration: none">
            <div class="topbar-avatar" id="topbar-avatar">--</div>
          </a>
        </div>
      </div>

      <div class="content">
        <div id="main-alert" class="alert"></div>

        <!-- Stats -->
        <div class="stats-row">
          <div class="stat-card">
            <div class="stat-icon blue">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <rect x="3" y="4" width="18" height="18" rx="2" />
                <line x1="16" y1="2" x2="16" y2="6" />
                <line x1="8" y1="2" x2="8" y2="6" />
                <line x1="3" y1="10" x2="21" y2="10" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-total">—</div>
              <div class="stat-label">Total Reservations</div>

          </div>
          <div class="stat-card">
            <div class="stat-icon amber">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="12" y1="8" x2="12" y2="12" />
                <line x1="12" y1="16" x2="12.01" y2="16" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-pending">—</div>
              <div class="stat-label">Pending</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon green">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <polyline points="20 6 9 17 4 12" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-approved">—</div>
              <div class="stat-label">Approved</div>
            </div>
          </div>
          <div class="stat-card">
            <div class="stat-icon red">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <circle cx="12" cy="12" r="10" />
                <line x1="15" y1="9" x2="9" y2="15" />
                <line x1="9" y1="9" x2="15" y2="15" />
              </svg>
            </div>
            <div class="stat-info">
              <div class="stat-value" id="stat-cancelled">—</div>
              <div class="stat-label">Cancelled</div>
            </div>
          </div>
        </div>

        <!-- Filter -->
        <div class="filter-bar">
          <button class="filter-btn active" onclick="setFilter('all', this)">
            All
          </button>
          <button class="filter-btn" onclick="setFilter('PENDING', this)">
            Pending
          </button>
          <button class="filter-btn" onclick="setFilter('APPROVED', this)">
            Approved
          </button>
          <button class="filter-btn" onclick="setFilter('CANCELLED', this)">
            Cancelled
          </button>
          <button class="filter-btn" onclick="setFilter('COMPLETED', this)">
            Completed
          </button>
          <button class="filter-btn" onclick="setFilter('upcoming', this)">
            Upcoming
          </button>
          <button class="filter-btn" onclick="setFilter('past', this)">
            Past
          </button>
        </div>

        <!-- List -->
        <div id="reservations-list">
          <div class="empty-state">
            <div class="spinner"></div>
            Loading your reservations...
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";
      const token = sessionStorage.getItem("token");
      const username = sessionStorage.getItem("username");
      const role = sessionStorage.getItem("role");

      if (!token) window.location.href = "/";

      if (username) {
        const initials = username.substring(0, 2).toUpperCase();
        document.getElementById("sidebar-avatar").textContent = initials;
        document.getElementById("topbar-avatar").textContent = initials;
        document.getElementById("sidebar-name").textContent = username;
        document.getElementById("sidebar-role").textContent =
          role === "LAB_TECHNICIAN" ? "Lab Technician" : "Student";
      }

      document.getElementById("topbar-date").textContent =
        new Date().toLocaleDateString("en-GB", {
          weekday: "short",
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      let allReservations = [];
      let currentFilter = "all";

      async function loadReservations() {
        try {
          const res = await fetch(`${API}/reservations/my`, {
            headers: { Authorization: "Bearer " + token },
          });
          allReservations = await res.json();
          updateStats();
          renderList();
        } catch (e) {
          document.getElementById("reservations-list").innerHTML =
            '<div class="empty-state"><div class="empty-icon">⚠️</div><div class="empty-title">Failed to load reservations</div></div>';
        }
      }

      function updateStats() {
        document.getElementById("stat-total").textContent =
          allReservations.length;
        document.getElementById("stat-pending").textContent =
          allReservations.filter((r) => r.status === "PENDING").length;
        document.getElementById("stat-approved").textContent =
          allReservations.filter((r) => r.status === "APPROVED").length;
        document.getElementById("stat-cancelled").textContent =
          allReservations.filter((r) => r.status === "CANCELLED").length;
      }

      function setFilter(filter, btn) {
        currentFilter = filter;
        document
          .querySelectorAll(".filter-btn")
          .forEach((b) => b.classList.remove("active"));
        btn.classList.add("active");
        renderList();
      }

      function renderList() {
        const now = new Date();
        let filtered = allReservations;

        if (currentFilter === "upcoming") {
          filtered = allReservations.filter(
            (r) => r.status !== "CANCELLED" && new Date(r.endTime) > now,
          );
        } else if (currentFilter === "past") {
          filtered = allReservations.filter(
            (r) => new Date(r.endTime) <= now || r.status === "CANCELLED",
          );
        } else if (currentFilter !== "all") {
          filtered = allReservations.filter((r) => r.status === currentFilter);
        }

        filtered.sort((a, b) => new Date(b.startTime) - new Date(a.startTime));

        const list = document.getElementById("reservations-list");
        if (!filtered.length) {
          list.innerHTML = `
        <div class="empty-state">
          <div class="empty-icon">📅</div>
          <div class="empty-title">No reservations found</div>
          <a href="/catalog.html" style="color:var(--orange);font-weight:600;text-decoration:none;font-size:13px;">Browse catalog to make a booking →</a>
        </div>`;
          return;
        }

        list.innerHTML = filtered
          .map((r) => {
            const start = new Date(r.startTime);
            const end = new Date(r.endTime);
            const name = r.equipment
              ? r.equipment.name
              : r.lab
                ? r.lab.labName
                : "Unknown";
            const type = r.equipment ? "Equipment" : "Lab Space";
            const location = r.lab ? r.lab.location : "—";
            const dateStr = start.toLocaleDateString("en-GB", {
              weekday: "short",
              day: "numeric",
              month: "short",
              year: "numeric",
            });
            const startTime = start.toLocaleTimeString("en-GB", {
              hour: "2-digit",
              minute: "2-digit",
            });
            const endTime = end.toLocaleTimeString("en-GB", {
              hour: "2-digit",
              minute: "2-digit",
            });
            const isPast = new Date(r.endTime) <= now;
            const canCancel =
              (r.status === "PENDING" || r.status === "APPROVED") && !isPast;

            const statusMap = {
              PENDING: "status-pending",
              APPROVED: "status-approved",
              CANCELLED: "status-cancelled",
              COMPLETED: "status-completed",
            };
            const statusLabel =
              r.status.charAt(0) + r.status.slice(1).toLowerCase();
            const statusClass = statusMap[r.status] || "status-pending";

            const icon = r.equipment
              ? `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="2" y="3" width="20" height="14" rx="2"/><path d="M6 9l3 3 3-6 3 5 2-2"/></svg>`
              : `<svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5"><path d="M3 9l9-7 9 7v11a2 2 0 01-2 2H5a2 2 0 01-2-2V9z"/></svg>`;

            return `
        <div class="res-card ${r.status === "CANCELLED" ? "cancelled" : ""}">
          <div class="res-icon">${icon}</div>
          <div class="res-body">
            <div class="res-name">${name}</div>
            <div class="res-meta">
              <div class="res-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
                ${dateStr}
              </div>
              <div class="res-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="12" cy="12" r="10"/><polyline points="12 6 12 12 16 14"/></svg>
                ${startTime} – ${endTime}
              </div>
              <div class="res-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0118 0z"/><circle cx="12" cy="10" r="3"/></svg>
                ${location}
              </div>
              <div class="res-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20.59 13.41l-7.17 7.17a2 2 0 01-2.83 0L2 12V2h10l8.59 8.59a2 2 0 010 2.82z"/></svg>
                ${type}
              </div>
              ${
                r.workstations > 1
                  ? `<div class="res-meta-item">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="3" width="20" height="14" rx="2"/></svg>
                ${r.workstations} workstations
              </div>`
                  : ""
              }
            </div>
          </div>
          <div class="res-right">
            <span class="status-badge ${statusClass}">${statusLabel}</span>
            ${canCancel ? `<button class="btn-cancel" onclick="cancelReservation(${r.id})">Cancel</button>` : ""}
          </div>
        </div>`;
          })
          .join("");
      }

      async function cancelReservation(id) {
        if (!confirm("Are you sure you want to cancel this reservation?"))
          return;
        try {
          const res = await fetch(`${API}/reservations/${id}/cancel`, {
            method: "PATCH",
            headers: { Authorization: "Bearer " + token },
          });
          if (!res.ok) throw new Error("Failed to cancel");
          showAlert("success", "Reservation cancelled successfully.");
          loadReservations();
        } catch (e) {
          showAlert("error", e.message);
        }
      }

      function showAlert(type, msg) {
        const el = document.getElementById("main-alert");
        el.className = `alert ${type} show`;
        el.textContent = msg;
        setTimeout(() => el.classList.remove("show"), 4000);
      }

      loadReservations();
    </script>

    <script src="/calendar.js"></script>
    <script src="/notifications.js"></script>
  </body>
</html>
