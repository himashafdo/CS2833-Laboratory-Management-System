<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Profile — Lab Management System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      :root {
        --orange: #f97316;
        --orange2: #ea6c0a;
        --orange3: #fb923c;
        --text: #1a1a2e;
        --text2: #64748b;
        --text3: #94a3b8;
        --border: #e2e8f0;
        --white: #ffffff;
        --bg: #f8fafc;
        --font: "Plus Jakarta Sans", sans-serif;
      }
      body {
        font-family: var(--font);
        background: var(--bg);
        min-height: 100vh;
        display: flex;
      }

      /* ── SIDEBAR ── */
      .sidebar {
        width: 240px;
        min-height: 100vh;
        flex-shrink: 0;
        background: linear-gradient(180deg, #f97316 0%, #c2410c 100%);
        display: flex;
        flex-direction: column;
        padding: 24px 0;
        position: fixed;
        left: 0;
        top: 0;
        bottom: 0;
        z-index: 100;
      }
      .sidebar-brand {
        padding: 0 20px 28px;
        border-bottom: 1px solid rgba(255, 255, 255, 0.15);
        margin-bottom: 16px;
      }
      .brand-row {
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .brand-icon {
        width: 38px;
        height: 38px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 10px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .brand-icon svg {
        width: 20px;
        height: 20px;
      }
      .brand-name {
        font-size: 14px;
        font-weight: 700;
        color: white;
        line-height: 1.2;
      }
      .nav-section {
        padding: 0 12px;
        flex: 1;
      }
      .nav-item {
        display: flex;
        align-items: center;
        gap: 10px;
        padding: 10px 12px;
        border-radius: 10px;
        margin-bottom: 4px;
        color: rgba(255, 255, 255, 0.8);
        font-size: 13px;
        font-weight: 500;
        cursor: pointer;
        transition: all 0.2s;
        text-decoration: none;
      }
      .nav-item:hover {
        background: rgba(255, 255, 255, 0.15);
        color: white;
      }
      .nav-item.active {
        background: rgba(255, 255, 255, 0.25);
        color: white;
        font-weight: 600;
      }
      .nav-item svg {
        width: 16px;
        height: 16px;
        flex-shrink: 0;
      }
      .sidebar-user {
        margin: 16px 12px 0;
        padding: 12px;
        border-radius: 12px;
        background: rgba(0, 0, 0, 0.15);
        display: flex;
        align-items: center;
        gap: 10px;
      }
      .user-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.3);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        flex-shrink: 0;
      }
      .user-name {
        font-size: 13px;
        font-weight: 600;
        color: white;
      }
      .user-role {
        font-size: 11px;
        color: rgba(255, 255, 255, 0.7);
      }

      /* ── MAIN ── */
      .main {
        margin-left: 240px;
        flex: 1;
        display: flex;
        flex-direction: column;
        min-height: 100vh;
      }

      /* ── TOPBAR ── */
      .topbar {
        background: var(--white);
        border-bottom: 1px solid var(--border);
        padding: 16px 32px;
        display: flex;
        align-items: center;
        justify-content: space-between;
        position: sticky;
        top: 0;
        z-index: 50;
      }
      .topbar-title {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .topbar-right {
        display: flex;
        align-items: center;
        gap: 12px;
      }
      .topbar-date {
        padding: 8px 14px;
        border: 1px solid var(--border);
        border-radius: 10px;
        font-size: 13px;
        color: var(--text2);
        background: var(--bg);
      }
      .topbar-icon {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        border: 1px solid var(--border);
        display: flex;
        align-items: center;
        justify-content: center;
        cursor: pointer;
        background: var(--white);
        color: var(--text2);
      }
      .topbar-avatar {
        width: 36px;
        height: 36px;
        border-radius: 50%;
        background: linear-gradient(135deg, var(--orange), var(--orange3));
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 13px;
        font-weight: 700;
        color: white;
        cursor: pointer;
      }

      /* ── CONTENT ── */
      .content {
        padding: 28px 32px;
        flex: 1;
        max-width: 900px;
      }

      /* ── PROFILE HEADER ── */
      .profile-header {
        background: linear-gradient(
          135deg,
          var(--orange) 0%,
          var(--orange2) 100%
        );
        border-radius: 20px;
        padding: 32px;
        display: flex;
        align-items: center;
        gap: 24px;
        margin-bottom: 28px;
        position: relative;
        overflow: hidden;
      }
      .profile-header::before {
        content: "";
        position: absolute;
        width: 200px;
        height: 200px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.08);
        top: -80px;
        right: 60px;
      }
      .profile-avatar-big {
        width: 80px;
        height: 80px;
        border-radius: 50%;
        background: rgba(255, 255, 255, 0.25);
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        font-weight: 700;
        color: white;
        border: 3px solid rgba(255, 255, 255, 0.4);
        flex-shrink: 0;
        position: relative;
        z-index: 1;
      }
      .profile-header-info {
        position: relative;
        z-index: 1;
      }
      .profile-header-name {
        font-size: 22px;
        font-weight: 700;
        color: white;
        margin-bottom: 4px;
      }
      .profile-header-email {
        font-size: 14px;
        color: rgba(255, 255, 255, 0.85);
        margin-bottom: 8px;
      }
      .profile-role-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        background: rgba(255, 255, 255, 0.2);
        border-radius: 20px;
        padding: 4px 12px;
        font-size: 12px;
        font-weight: 600;
        color: white;
      }

      /* ── SECTIONS ── */
      .profile-grid {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 20px;
      }

      .profile-card {
        background: var(--white);
        border: 1px solid var(--border);
        border-radius: 16px;
        padding: 24px;
      }
      .card-title {
        font-size: 15px;
        font-weight: 700;
        color: var(--text);
        margin-bottom: 20px;
        display: flex;
        align-items: center;
        gap: 8px;
      }
      .card-title svg {
        width: 18px;
        height: 18px;
        color: var(--orange);
      }

      /* ── FORM FIELDS ── */
      .field {
        display: flex;
        flex-direction: column;
        gap: 6px;
        margin-bottom: 16px;
      }
      .field:last-of-type {
        margin-bottom: 0;
      }
      .field label {
        font-size: 11px;
        font-weight: 600;
        color: var(--text2);
        text-transform: uppercase;
        letter-spacing: 0.04em;
      }
      .field input {
        padding: 10px 14px;
        border: 1.5px solid var(--border);
        border-radius: 10px;
        font-family: var(--font);
        font-size: 14px;
        color: var(--text);
        outline: none;
        transition: border-color 0.2s;
        background: var(--bg);
      }
      .field input:focus {
        border-color: var(--orange);
        background: var(--white);
        box-shadow: 0 0 0 3px rgba(249, 115, 22, 0.08);
      }
      .field input:disabled {
        background: #f8fafc;
        color: var(--text2);
        cursor: not-allowed;
        border-color: var(--border);
      }
      .field-hint {
        font-size: 11px;
        color: var(--text3);
        margin-top: 2px;
      }

      .pw-wrap {
        position: relative;
      }
      .pw-wrap input {
        padding-right: 44px;
      }
      .pw-toggle {
        position: absolute;
        right: 14px;
        top: 50%;
        transform: translateY(-50%);
        background: none;
        border: none;
        cursor: pointer;
        color: var(--text3);
        display: flex;
        align-items: center;
      }
      .pw-toggle:hover {
        color: var(--orange);
      }

      /* ── BUTTONS ── */
      .btn-save {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: none;
        background: linear-gradient(135deg, var(--orange), var(--orange2));
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        color: white;
        cursor: pointer;
        transition: all 0.2s;
        box-shadow: 0 4px 12px rgba(249, 115, 22, 0.3);
        margin-top: 20px;
      }
      .btn-save:hover {
        opacity: 0.9;
        transform: translateY(-1px);
      }
      .btn-save:disabled {
        opacity: 0.6;
        cursor: not-allowed;
        transform: none;
      }
      .btn-save .spinner {
        display: none;
        width: 16px;
        height: 16px;
        border: 2px solid rgba(255, 255, 255, 0.4);
        border-top-color: white;
        border-radius: 50%;
        animation: spin 0.6s linear infinite;
        margin: 0 auto;
      }
      .btn-save.loading .btn-text {
        display: none;
      }
      .btn-save.loading .spinner {
        display: block;
      }

      .btn-logout {
        width: 100%;
        padding: 12px;
        border-radius: 10px;
        border: 1.5px solid #fecdd3;
        background: #fff1f2;
        font-family: var(--font);
        font-size: 14px;
        font-weight: 600;
        color: #ef4444;
        cursor: pointer;
        transition: all 0.2s;
        margin-top: 12px;
      }
      .btn-logout:hover {
        background: #fecdd3;
      }

      /* ── ALERTS ── */
      .alert {
        padding: 10px 14px;
        border-radius: 8px;
        font-size: 13px;
        margin-bottom: 16px;
        display: none;
      }
      .alert.show {
        display: block;
      }
      .alert.success {
        background: #f0fdf4;
        border: 1px solid #bbf7d0;
        color: #166534;
      }
      .alert.error {
        background: #fff1f2;
        border: 1px solid #fecdd3;
        color: #be123c;
      }

      /* ── STATS ── */
      .stats-mini {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 12px;
        margin-bottom: 20px;
      }
      .stat-mini {
        background: var(--bg);
        border-radius: 10px;
        padding: 14px;
        text-align: center;
      }
      .stat-mini-value {
        font-size: 20px;
        font-weight: 700;
        color: var(--text);
      }
      .stat-mini-label {
        font-size: 11px;
        color: var(--text2);
        margin-top: 2px;
      }

      @keyframes spin {
        to {
          transform: rotate(360deg);
        }
      }

      @media (max-width: 900px) {
        .profile-grid {
          grid-template-columns: 1fr;
        }
      }
      @media (max-width: 768px) {
        .sidebar {
          display: none;
        }
        .main {
          margin-left: 0;
        }
        .content {
          padding: 20px 16px;
        }
      }
    </style>
  </head>
  <body>
    <!-- ── SIDEBAR ── -->
    <aside class="sidebar">
      <div class="sidebar-brand">
        <div class="brand-row">
          <div class="brand-icon">
            <svg
              viewBox="0 0 32 32"
              fill="none"
              stroke="white"
              stroke-width="1.8"
              stroke-linecap="round"
              stroke-linejoin="round"
            >
              <line x1="4" y1="16" x2="12" y2="16" />
              <line x1="12" y1="9" x2="12" y2="23" />
              <line x1="12" y1="10.5" x2="26" y2="5" />
              <line x1="12" y1="21.5" x2="26" y2="27" />
              <polygon
                points="22,24.5 26,27 23.5,22.5"
                fill="white"
                stroke="none"
              />
              <line x1="26" y1="5" x2="26" y2="2" />
              <line x1="26" y1="27" x2="26" y2="30" />
            </svg>
          </div>
          <div><div class="brand-name">Laboratory Management System</div></div>
        </div>
      </div>
      <nav class="nav-section">
        <a href="/student-dashboard.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="3" width="7" height="7" />
            <rect x="14" y="3" width="7" height="7" />
            <rect x="3" y="14" width="7" height="7" />
            <rect x="14" y="14" width="7" height="7" />
          </svg>
          Dashboard
        </a>
        <a href="/catalog.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path d="M4 6h16M4 10h16M4 14h16M4 18h16" />
          </svg>
          Equipment & Lab Spaces
        </a>
        <a href="/my-reservations.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <rect x="3" y="4" width="18" height="18" rx="2" />
            <line x1="16" y1="2" x2="16" y2="6" />
            <line x1="8" y1="2" x2="8" y2="6" />
            <line x1="3" y1="10" x2="21" y2="10" />
          </svg>
          My Reservations
        </a>
        <a href="/report-issue.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <circle cx="12" cy="12" r="10" />
            <line x1="12" y1="8" x2="12" y2="12" />
            <line x1="12" y1="16" x2="12.01" y2="16" />
          </svg>
          Report Issue
        </a>
        <a href="/equipment-requests.html" class="nav-item">
          <svg
            viewBox="0 0 24 24"
            fill="none"
            stroke="currentColor"
            stroke-width="2"
          >
            <path
              d="M9 5H7a2 2 0 00-2 2v12a2 2 0 002 2h10a2 2 0 002-2V7a2 2 0 00-2-2h-2M9 5a2 2 0 002 2h2a2 2 0 002-2M9 5a2 2 0 012-2h2a2 2 0 012 2"
            />
          </svg>
          Equipment Requests
        </a>
      </nav>
      <div class="sidebar-user">
        <div class="user-avatar" id="sidebar-avatar">--</div>
        <div>
          <div class="user-name" id="sidebar-name">Loading...</div>
          <div class="user-role" id="sidebar-role">Student</div>
        </div>
      </div>
    </aside>

    <!-- ── MAIN ── -->
    <div class="main">
      <div class="topbar">
        <div class="topbar-title">My Profile</div>
        <div class="topbar-right">
          <div class="topbar-date" id="topbar-date"></div>
          <div class="topbar-icon">
            <svg
              width="16"
              height="16"
              viewBox="0 0 24 24"
              fill="none"
              stroke="currentColor"
              stroke-width="2"
            >
              <path
                d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9M13.73 21a2 2 0 01-3.46 0"
              />
            </svg>
          </div>
          <div class="topbar-avatar" id="topbar-avatar">--</div>
        </div>
      </div>

      <div class="content">
        <!-- Profile Header -->
        <div class="profile-header">
          <div class="profile-avatar-big" id="header-avatar">--</div>
          <div class="profile-header-info">
            <div class="profile-header-name" id="header-name">Loading...</div>
            <div class="profile-header-email" id="header-email">--</div>
            <div class="profile-role-badge" id="header-role">
              <svg
                width="12"
                height="12"
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2" />
                <circle cx="12" cy="7" r="4" />
              </svg>
              Student
            </div>
          </div>
        </div>

        <div class="profile-grid">
          <!-- Edit Profile -->
          <div class="profile-card">
            <div class="card-title">
              <svg
                viewBox="0 0 24 24"
                fill="none"
                stroke="currentColor"
                stroke-width="2"
              >
                <path
                  d="M11 4H4a2 2 0 00-2 2v14a2 2 0 002 2h14a2 2 0 002-2v-7"
                />
                <path
                  d="M18.5 2.5a2.121 2.121 0 013 3L12 15l-4 1 1-4 9.5-9.5z"
                />
              </svg>
              Edit Profile
            </div>
            <div id="profile-alert" class="alert"></div>
            <div class="field">
              <label>Username</label>
              <input type="text" id="field-username" disabled />
              <div class="field-hint">Username cannot be changed</div>
            </div>
            <div class="field">
              <label>Email Address</label>
              <input
                type="email"
                id="field-email"
                placeholder="your@email.com"
              />
            </div>
            <div class="field">
              <label>Phone Number</label>
              <input
                type="tel"
                id="field-phone"
                placeholder="+94 77 123 4567"
              />
            </div>
            <div class="field">
              <label>Role</label>
              <input type="text" id="field-role" disabled />
              <div class="field-hint">Role is assigned by admin</div>
            </div>
            <button class="btn-save" id="save-btn" onclick="saveProfile()">
              <span class="btn-text">Save Changes</span>
              <div class="spinner"></div>
            </button>
          </div>

          <!-- Right column -->
          <div style="display: flex; flex-direction: column; gap: 20px">
            <!-- Change Password -->
            <div class="profile-card">
              <div class="card-title">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <rect x="3" y="11" width="18" height="11" rx="2" />
                  <path d="M7 11V7a5 5 0 0110 0v4" />
                </svg>
                Change Password
              </div>
              <div id="pw-alert" class="alert"></div>
              <div class="field">
                <label>Current Password</label>
                <div class="pw-wrap">
                  <input
                    type="password"
                    id="current-password"
                    placeholder="Enter current password"
                  />
                  <button
                    class="pw-toggle"
                    onclick="togglePw('current-password')"
                    type="button"
                  >
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="field">
                <label>New Password</label>
                <div class="pw-wrap">
                  <input
                    type="password"
                    id="new-password"
                    placeholder="Enter new password"
                  />
                  <button
                    class="pw-toggle"
                    onclick="togglePw('new-password')"
                    type="button"
                  >
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>
              <div class="field">
                <label>Confirm New Password</label>
                <div class="pw-wrap">
                  <input
                    type="password"
                    id="confirm-password"
                    placeholder="Confirm new password"
                  />
                  <button
                    class="pw-toggle"
                    onclick="togglePw('confirm-password')"
                    type="button"
                  >
                    <svg
                      width="16"
                      height="16"
                      viewBox="0 0 24 24"
                      fill="none"
                      stroke="currentColor"
                      stroke-width="2"
                    >
                      <path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z" />
                      <circle cx="12" cy="12" r="3" />
                    </svg>
                  </button>
                </div>
              </div>
              <button class="btn-save" id="pw-btn" onclick="changePassword()">
                <span class="btn-text">Update Password</span>
                <div class="spinner"></div>
              </button>
            </div>

            <!-- Account Actions -->
            <div class="profile-card">
              <div class="card-title">
                <svg
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                >
                  <circle cx="12" cy="12" r="3" />
                  <path
                    d="M19.4 15a1.65 1.65 0 00.33 1.82l.06.06a2 2 0 010 2.83 2 2 0 01-2.83 0l-.06-.06a1.65 1.65 0 00-1.82-.33 1.65 1.65 0 00-1 1.51V21a2 2 0 01-4 0v-.09A1.65 1.65 0 009 19.4a1.65 1.65 0 00-1.82.33l-.06.06a2 2 0 01-2.83-2.83l.06-.06A1.65 1.65 0 004.68 15a1.65 1.65 0 00-1.51-1H3a2 2 0 010-4h.09A1.65 1.65 0 004.6 9a1.65 1.65 0 00-.33-1.82l-.06-.06a2 2 0 012.83-2.83l.06.06A1.65 1.65 0 009 4.68a1.65 1.65 0 001-1.51V3a2 2 0 014 0v.09a1.65 1.65 0 001 1.51 1.65 1.65 0 001.82-.33l.06-.06a2 2 0 012.83 2.83l-.06.06A1.65 1.65 0 0019.4 9a1.65 1.65 0 001.51 1H21a2 2 0 010 4h-.09a1.65 1.65 0 00-1.51 1z"
                  />
                </svg>
                Account
              </div>
              <div class="stats-mini">
                <div class="stat-mini">
                  <div class="stat-mini-value" id="stat-total">—</div>
                  <div class="stat-mini-label">Total Bookings</div>
                </div>
                <div class="stat-mini">
                  <div class="stat-mini-value" id="stat-upcoming">—</div>
                  <div class="stat-mini-label">Upcoming</div>
                </div>
              </div>
              <button class="btn-logout" onclick="logout()">
                <svg
                  width="16"
                  height="16"
                  viewBox="0 0 24 24"
                  fill="none"
                  stroke="currentColor"
                  stroke-width="2"
                  style="margin-right: 6px; vertical-align: -2px"
                >
                  <path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4" />
                  <polyline points="16 17 21 12 16 7" />
                  <line x1="21" y1="12" x2="9" y2="12" />
                </svg>
                Sign Out
              </button>
            </div>
          </div>
        </div>
      </div>
    </div>

    <script>
      const API = "http://localhost:8080/api";
      const token = sessionStorage.getItem("token");
      const username = sessionStorage.getItem("username");
      const role = sessionStorage.getItem("role");

      if (!token) window.location.href = "/";

      document.getElementById("topbar-date").textContent =
        new Date().toLocaleDateString("en-GB", {
          weekday: "short",
          day: "numeric",
          month: "long",
          year: "numeric",
        });

      // ── LOAD PROFILE ──
      async function loadProfile() {
        try {
          const res = await fetch(`${API}/auth/profile`, {
            headers: { Authorization: "Bearer " + token },
          });
          const user = await res.json();

          const initials = user.username.substring(0, 2).toUpperCase();

          // Sidebar
          document.getElementById("sidebar-avatar").textContent = initials;
          document.getElementById("sidebar-name").textContent = user.username;
          document.getElementById("sidebar-role").textContent =
            user.role === "LAB_TECHNICIAN" ? "Lab Technician" : "Student";
          document.getElementById("topbar-avatar").textContent = initials;

          // Header
          document.getElementById("header-avatar").textContent = initials;
          document.getElementById("header-name").textContent = user.username;
          document.getElementById("header-email").textContent = user.email;
          document.getElementById("header-role").innerHTML = `
        <svg width="12" height="12" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M20 21v-2a4 4 0 00-4-4H8a4 4 0 00-4 4v2"/><circle cx="12" cy="7" r="4"/></svg>
        ${user.role === "LAB_TECHNICIAN" ? "Lab Technician" : user.role === "ADMIN" ? "Administrator" : "Student"}`;

          // Form fields
          document.getElementById("field-username").value = user.username;
          document.getElementById("field-email").value = user.email || "";
          document.getElementById("field-phone").value = user.phoneNumber || "";
          document.getElementById("field-role").value =
            user.role === "LAB_TECHNICIAN"
              ? "Lab Technician"
              : user.role === "ADMIN"
                ? "Administrator"
                : "Student";
        } catch (e) {
          console.error("Failed to load profile", e);
        }
      }

      // ── LOAD RESERVATION STATS ──
      async function loadStats() {
        try {
          const res = await fetch(`${API}/reservations/my`, {
            headers: { Authorization: "Bearer " + token },
          });
          const reservations = await res.json();
          const now = new Date();
          const upcoming = reservations.filter(
            (r) => r.status !== "CANCELLED" && new Date(r.endTime) > now,
          );
          document.getElementById("stat-total").textContent =
            reservations.length;
          document.getElementById("stat-upcoming").textContent =
            upcoming.length;
        } catch (e) {
          document.getElementById("stat-total").textContent = "—";
          document.getElementById("stat-upcoming").textContent = "—";
        }
      }

      // ── SAVE PROFILE ──
      async function saveProfile() {
        const email = document.getElementById("field-email").value.trim();
        const phone = document.getElementById("field-phone").value.trim();

        if (!email)
          return showAlert("profile-alert", "error", "Email cannot be empty");

        setLoading("save-btn", true);
        try {
          const res = await fetch(`${API}/auth/profile`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({ email, phoneNumber: phone }),
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Update failed");
          }
          showAlert(
            "profile-alert",
            "success",
            "Profile updated successfully!",
          );
          document.getElementById("header-email").textContent = email;
        } catch (e) {
          showAlert("profile-alert", "error", e.message);
        } finally {
          setLoading("save-btn", false);
        }
      }

      // ── CHANGE PASSWORD ──
      async function changePassword() {
        const current = document.getElementById("current-password").value;
        const newPw = document.getElementById("new-password").value;
        const confirm = document.getElementById("confirm-password").value;

        if (!current || !newPw || !confirm)
          return showAlert("pw-alert", "error", "Please fill in all fields");
        if (newPw.length < 6)
          return showAlert(
            "pw-alert",
            "error",
            "Password must be at least 6 characters",
          );
        if (newPw !== confirm)
          return showAlert("pw-alert", "error", "Passwords do not match");

        setLoading("pw-btn", true);
        try {
          const res = await fetch(`${API}/auth/profile`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: "Bearer " + token,
            },
            body: JSON.stringify({
              currentPassword: current,
              newPassword: newPw,
            }),
          });
          if (!res.ok) {
            const data = await res.json();
            throw new Error(data.error || "Password update failed");
          }
          showAlert("pw-alert", "success", "Password updated successfully!");
          document.getElementById("current-password").value = "";
          document.getElementById("new-password").value = "";
          document.getElementById("confirm-password").value = "";
        } catch (e) {
          showAlert("pw-alert", "error", e.message);
        } finally {
          setLoading("pw-btn", false);
        }
      }

      // ── LOGOUT ──
      function logout() {
        if (!confirm("Are you sure you want to sign out?")) return;
        sessionStorage.clear();
        window.location.href = "/";
      }

      // ── HELPERS ──
      function togglePw(id) {
        const inp = document.getElementById(id);
        inp.type = inp.type === "password" ? "text" : "password";
      }

      function showAlert(id, type, msg) {
        const el = document.getElementById(id);
        el.className = `alert ${type} show`;
        el.textContent = msg;
        setTimeout(() => el.classList.remove("show"), 4000);
      }

      function setLoading(btnId, on) {
        const btn = document.getElementById(btnId);
        btn.classList.toggle("loading", on);
        btn.disabled = on;
      }

      // ── INIT ──
      loadProfile();
      loadStats();
    </script>

    <script src="/calendar.js"></script>
    <script src="/notifications.js"></script>
  </body>
</html>
