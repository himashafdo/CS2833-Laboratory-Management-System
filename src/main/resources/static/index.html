<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>LabMS — Lab Management System</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700&display=swap"
      rel="stylesheet"
    />
    <style>
      *,
      *::before,
      *::after {
        box-sizing: border-box;
        margin: 0;
        padding: 0;
      }
      body {
        font-family: "Plus Jakarta Sans", sans-serif;
        background: #0f172a;
        min-height: 100vh;
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        overflow: hidden;
      }

      .ring-wrap {
        position: relative;
        width: 180px;
        height: 180px;
      }
      .arc {
        position: absolute;
        inset: 0;
        border-radius: 50%;
      }
      .arc1 {
        border: 6px solid transparent;
        border-top-color: #f97316;
        animation: spin1 1.4s linear infinite;
      }
      .arc2 {
        border: 6px solid transparent;
        border-right-color: #fb923c;
        animation: spin2 1.8s linear infinite;
        inset: 10px;
      }
      .arc3 {
        border: 6px solid transparent;
        border-bottom-color: #334155;
        border-left-color: #ea6c0a;
        animation: spin3 2.2s linear infinite;
        inset: 20px;
      }
      .arc4 {
        border: 6px solid transparent;
        border-top-color: #f97316;
        border-bottom-color: #fb923c;
        animation: spin1 1s linear infinite reverse;
        inset: 30px;
      }
      .arc5 {
        border: 4px solid transparent;
        border-right-color: #ea6c0a;
        border-left-color: #f97316;
        animation: spin2 0.8s linear infinite reverse;
        inset: 42px;
      }

      @keyframes spin1 {
        to {
          transform: rotate(360deg);
        }
      }
      @keyframes spin2 {
        to {
          transform: rotate(-360deg);
        }
      }
      @keyframes spin3 {
        to {
          transform: rotate(360deg);
        }
      }

      .logo-center {
        position: absolute;
        inset: 54px;
        display: flex;
        align-items: center;
        justify-content: center;
      }
      .logo-svg {
        width: 58px;
        height: 58px;
      }

      .logo-line {
        stroke-dasharray: 60;
        stroke-dashoffset: 60;
        animation: draw 1.2s ease forwards;
      }
      .logo-line2 {
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: draw 1.2s 0.3s ease forwards;
      }
      .logo-line3 {
        stroke-dasharray: 40;
        stroke-dashoffset: 40;
        animation: draw 1.2s 0.6s ease forwards;
      }
      .logo-poly {
        stroke-dasharray: 20;
        stroke-dashoffset: 20;
        animation: draw 0.6s 1s ease forwards;
      }
      .logo-dot1 {
        r: 0;
        animation: pop 0.4s 1.2s ease forwards;
      }
      .logo-dot2 {
        r: 0;
        animation: pop 0.4s 1.4s ease forwards;
      }
      .logo-end1 {
        opacity: 0;
        animation: fadeUp 0.4s 1.5s ease forwards;
      }
      .logo-end2 {
        opacity: 0;
        animation: fadeUp 0.4s 1.5s ease forwards;
      }

      @keyframes draw {
        to {
          stroke-dashoffset: 0;
        }
      }
      @keyframes pop {
        to {
          r: 2.5;
        }
      }
      @keyframes fadeUp {
        from {
          opacity: 0;
          transform: translateY(3px);
        }
        to {
          opacity: 1;
          transform: translateY(0);
        }
      }

      .text-wrap {
        margin-top: 28px;
        text-align: center;
        opacity: 0;
        animation: fadeUp 0.8s 1.6s ease forwards;
      }
      .labms-text {
        font-size: 38px;
        font-weight: 700;
        letter-spacing: 0.1em;
        background: linear-gradient(135deg, #f97316, #fb923c, #ea6c0a);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
      }
      .company-text {
        font-family: "Courier New", monospace;
        font-size: 11px;
        letter-spacing: 0.3em;
        color: #475569;
        text-transform: uppercase;
        margin-top: 7px;
      }

      .progress-wrap {
        margin-top: 32px;
        width: 160px;
        height: 3px;
        background: #1e293b;
        border-radius: 99px;
        overflow: hidden;
        opacity: 0;
        animation: fadeUp 0.5s 1.8s ease forwards;
      }
      .progress-bar {
        height: 100%;
        width: 0%;
        border-radius: 99px;
        background: linear-gradient(90deg, #f97316, #fb923c);
        animation: load 2s 1.9s cubic-bezier(0.4, 0, 0.2, 1) forwards;
      }
      @keyframes load {
        0% {
          width: 0%;
        }
        30% {
          width: 28%;
        }
        60% {
          width: 65%;
        }
        85% {
          width: 90%;
        }
        100% {
          width: 100%;
        }
      }

      /* fade out whole page before redirect */
      body.fade-out {
        animation: fadeOut 0.6s ease forwards;
      }
      @keyframes fadeOut {
        to {
          opacity: 0;
        }
      }
    </style>
  </head>
  <body>
    <div class="ring-wrap">
      <div class="arc arc1"></div>
      <div class="arc arc2"></div>
      <div class="arc arc3"></div>
      <div class="arc arc4"></div>
      <div class="arc arc5"></div>
      <div class="logo-center">
        <svg
          class="logo-svg"
          viewBox="0 0 32 32"
          fill="none"
          stroke-linecap="round"
          stroke-linejoin="round"
        >
          <line
            class="logo-line"
            x1="4"
            y1="16"
            x2="12"
            y2="16"
            stroke="#f97316"
            stroke-width="1.8"
          />
          <line
            class="logo-line"
            x1="12"
            y1="9"
            x2="12"
            y2="23"
            stroke="#f97316"
            stroke-width="1.8"
          />
          <line
            class="logo-line2"
            x1="12"
            y1="10.5"
            x2="26"
            y2="5"
            stroke="#fb923c"
            stroke-width="1.8"
          />
          <line
            class="logo-line3"
            x1="12"
            y1="21.5"
            x2="26"
            y2="27"
            stroke="#fb923c"
            stroke-width="1.8"
          />
          <polygon
            class="logo-poly"
            points="22,24.5 26,27 23.5,22.5"
            fill="#ea6c0a"
            stroke="none"
          />
          <circle
            class="logo-dot1"
            cx="26"
            cy="5"
            fill="#f97316"
            stroke="none"
          />
          <circle
            class="logo-dot2"
            cx="26"
            cy="27"
            fill="#fb923c"
            stroke="none"
          />
          <line
            class="logo-end1"
            x1="26"
            y1="3"
            x2="26"
            y2="0.5"
            stroke="#f97316"
            stroke-width="1.8"
          />
          <line
            class="logo-end2"
            x1="26"
            y1="29"
            x2="26"
            y2="31.5"
            stroke="#fb923c"
            stroke-width="1.8"
          />
        </svg>
      </div>
    </div>

    <div class="text-wrap">
      <div class="labms-text">LabMS</div>
      <div class="company-text">by Company A</div>
    </div>

    <div class="progress-wrap">
      <div class="progress-bar"></div>
    </div>

    <script>
      // progress bar ends at ~3.9s (1.9s delay + 2s animation)
      // fade out at 3.6s then redirect
      setTimeout(() => {
        document.body.classList.add("fade-out");
        setTimeout(() => (window.location.href = "/login.html"), 600);
      }, 3600);
    </script>
  </body>
</html>
